<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <title>Profile · MR Chat</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           PROFILE.HTML — Full-screen profile page (dark theme, mobile-first)
           Spec: bg #0f172a, card #1e293b, border #334155, text #f8fafc
           Mobile-first (375px base). Animations: tab fade 200ms,
           button press scale(0.97), avatar glow pulse 2s.
           Accessibility: aria-labels, WCAG AA contrast, focus states,
           prefers-reduced-motion support.
           ============================================================ */

        :root {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-card-2: #243043;
            --border: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --text-secondary: #cbd5e1;
            --pink: #ec4899;
            --pink-2: #f472b6;
            --purple: #a855f7;
            --gold: #fbbf24;
            --diamond: #22d3ee;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #3b82f6;
            --orange: #f97316;
            --avatar-size: 120px;
            --header-h: 56px;
            --tabs-h: 48px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
        }
        img { display: block; max-width: 100%; }
        button { font-family: inherit; cursor: pointer; }
        a { color: var(--pink-2); text-decoration: none; }

        /* Focus states for accessibility */
        button:focus-visible, a:focus-visible, [role="tab"]:focus-visible, [role="button"]:focus-visible {
            outline: 2px solid var(--pink-2);
            outline-offset: 2px;
        }

        /* ==================== HEADER BAR ==================== */
        .top-header {
            position: sticky; top: 0; z-index: 50;
            height: var(--header-h);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 12px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .top-header .icon-btn {
            width: 40px; height: 40px; border-radius: 50%;
            border: none; background: transparent; color: var(--text);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            transition: background 0.15s, transform 0.15s;
        }
        .top-header .icon-btn:hover { background: rgba(255,255,255,0.06); }
        .top-header .icon-btn:active { transform: scale(0.92); }
        .top-header .page-title { font-weight: 700; font-size: 1rem; }

        /* ==================== COVER ==================== */
        .cover-wrap {
            position: relative;
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            background-size: cover;
            background-position: center;
        }
        .cover-wrap::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(15,23,42,0) 30%, rgba(15,23,42,0.85) 100%);
            pointer-events: none;
        }
        .cover-edit-btn {
            position: absolute; top: 12px; right: 12px;
            background: rgba(0,0,0,0.55); color: #fff;
            border: none; padding: 8px 12px; border-radius: 999px;
            font-size: 0.78rem; font-weight: 600;
            display: none; align-items: center; gap: 6px;
            z-index: 2;
        }
        .cover-edit-btn.own { display: inline-flex; }

        /* ==================== AVATAR ==================== */
        .avatar-wrap {
            position: relative;
            width: var(--avatar-size); height: var(--avatar-size);
            margin: calc(var(--avatar-size) / -2) auto 0;
            z-index: 5;
        }
        .avatar-ring {
            position: absolute; inset: -6px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--gold), #fff7d6, var(--gold), #b45309, var(--gold));
            animation: avatarGlowPulse 2s ease-in-out infinite;
            filter: blur(0.5px);
        }
        .avatar-ring.hidden { display: none; }
        @keyframes avatarGlowPulse {
            0%, 100% {
                box-shadow: 0 0 12px rgba(251, 191, 36, 0.5), 0 0 24px rgba(251, 191, 36, 0.25);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 22px rgba(251, 191, 36, 0.85), 0 0 38px rgba(251, 191, 36, 0.45);
                transform: scale(1.03);
            }
        }
        .avatar-img {
            position: relative; z-index: 2;
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg);
            background: var(--bg-card);
        }
        .verified-badge {
            position: absolute;
            bottom: 4px; right: 4px;
            z-index: 3;
            color: var(--diamond);
            font-size: 1.6rem;
            background: var(--bg);
            border-radius: 50%;
            line-height: 1;
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
        }
        .verified-badge.hidden { display: none; }

        /* ==================== IDENTITY ==================== */
        .identity-block {
            text-align: center;
            padding: 12px 20px 4px;
        }
        .display-name {
            font-size: 24px; font-weight: 800;
            margin: 0 0 2px;
            display: inline-flex; align-items: center; gap: 8px;
            justify-content: center;
        }
        .username {
            font-size: 14px; color: var(--text-muted);
            margin: 0 0 10px;
        }
        .bio-block {
            font-size: 0.92rem; color: var(--text-secondary);
            max-width: 540px; margin: 0 auto;
            text-align: center;
            line-height: 1.55;
            white-space: pre-line;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }
        .bio-block.expanded { -webkit-line-clamp: unset; overflow: visible; display: block; }
        .bio-read-more {
            display: inline-block;
            background: none; border: none;
            color: var(--pink-2); font-weight: 600;
            font-size: 0.82rem; padding: 4px 8px;
            margin: 4px auto 0;
        }
        .bio-read-more:hover { text-decoration: underline; }

        /* ==================== BADGES ROW ==================== */
        .badges-row {
            display: flex; gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 12px 16px 4px;
            justify-content: center; flex-wrap: wrap;
            max-width: 100%;
        }
        .badges-row::-webkit-scrollbar { display: none; }
        .badge-pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 0.72rem; font-weight: 700;
            white-space: nowrap;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
        }
        .badge-pill i { font-size: 0.7rem; }
        .badge-pill.early { color: var(--pink-2); border-color: rgba(236, 72, 153, 0.3); background: rgba(236, 72, 153, 0.08); }
        .badge-pill.premium { color: var(--gold); border-color: rgba(251, 191, 36, 0.3); background: rgba(251, 191, 36, 0.08); }
        .badge-pill.winner { color: var(--orange); border-color: rgba(249, 115, 22, 0.3); background: rgba(249, 115, 22, 0.08); }
        .badge-pill.rich { color: var(--gold); border-color: rgba(251, 191, 36, 0.3); background: rgba(251, 191, 36, 0.08); }
        .badge-pill.owner { color: var(--purple); border-color: rgba(168, 85, 247, 0.3); background: rgba(168, 85, 247, 0.08); }
        .badge-pill.admin { color: var(--red); border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.08); }
        .badge-pill.verified { color: var(--diamond); border-color: rgba(34, 211, 238, 0.3); background: rgba(34, 211, 238, 0.08); }

        /* ==================== STATS BAR ==================== */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 14px 16px 8px;
            max-width: 600px;
            margin: 0 auto;
        }
        .stat-tile {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 4px;
            text-align: center;
        }
        .stat-tile .num {
            font-size: 1.15rem; font-weight: 800; color: var(--text);
            line-height: 1.2;
        }
        .stat-tile .lbl {
            font-size: 0.62rem; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ==================== CURRENCY ROW ==================== */
        .currency-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 8px 16px 14px;
            max-width: 600px;
            margin: 0 auto;
        }
        .currency-card {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px;
            border-radius: 14px;
            border: 1px solid var(--border);
            font-weight: 800; font-size: 1.05rem;
        }
        .currency-card.gold { background: rgba(251, 191, 36, 0.08); color: var(--gold); border-color: rgba(251, 191, 36, 0.2); }
        .currency-card.diamond { background: rgba(34, 211, 238, 0.08); color: var(--diamond); border-color: rgba(34, 211, 238, 0.2); }
        .currency-card i { font-size: 1.1rem; }

        /* ==================== ACTION BUTTONS ==================== */
        .actions-row {
            display: flex; gap: 8px;
            padding: 4px 16px 12px;
            max-width: 600px;
            margin: 0 auto;
        }
        .action-btn {
            flex: 1;
            padding: 11px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text);
            font-size: 0.88rem;
            font-weight: 700;
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease;
        }
        .action-btn:active { transform: scale(0.97); }
        .action-btn:hover { background: var(--bg-card-2); }
        .action-btn.primary { background: linear-gradient(135deg, var(--pink), var(--purple)); border-color: transparent; color: #fff; }
        .action-btn.primary:hover { filter: brightness(1.05); }
        .action-btn.muted { background: var(--bg-card-2); color: var(--text-muted); }
        .action-btn.outline { background: transparent; }

        /* ==================== STICKY TABS ==================== */
        .tabs-bar {
            position: sticky;
            top: var(--header-h);
            z-index: 40;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            padding: 8px 12px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            background: transparent; border: none;
            color: var(--text-muted);
            font-size: 0.85rem; font-weight: 700;
            padding: 10px 8px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            position: relative;
            transition: color 0.15s ease, background 0.15s ease;
        }
        .tab-btn:hover { color: var(--text); background: var(--bg-card); }
        .tab-btn.active { color: var(--pink-2); }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 25%; right: 25%;
            height: 3px; border-radius: 3px;
            background: linear-gradient(90deg, var(--pink), var(--purple));
        }
        .tab-btn[aria-disabled="true"] { opacity: 0.4; pointer-events: none; }

        /* ==================== TAB CONTENT ==================== */
        .tab-content {
            padding: 16px;
            max-width: 720px;
            margin: 0 auto;
            animation: tabFadeIn 0.2s ease;
        }
        @keyframes tabFadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* About tab — info list */
        .info-list {
            display: flex; flex-direction: column;
            gap: 8px;
        }
        .info-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .info-item i {
            color: var(--pink-2); width: 24px; text-align: center;
            font-size: 1rem;
        }
        .info-item .lbl {
            font-size: 0.78rem; color: var(--text-muted);
            min-width: 90px; font-weight: 600;
        }
        .info-item .val {
            font-size: 0.9rem; color: var(--text); font-weight: 600;
            flex: 1;
        }
        .info-item .interests-grid {
            display: flex; gap: 6px; flex-wrap: wrap;
            flex: 1;
        }
        .interest-chip {
            padding: 4px 12px;
            background: rgba(236, 72, 153, 0.1);
            border: 1px solid rgba(236, 72, 153, 0.2);
            border-radius: 16px;
            font-size: 0.75rem; font-weight: 600;
            color: var(--pink-2);
        }

        /* Posts grid */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }
        .post-thumb {
            aspect-ratio: 1 / 1;
            background: var(--bg-card);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted);
            font-size: 0.7rem;
            text-align: center;
            padding: 8px;
            word-break: break-word;
        }
        .post-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .post-thumb .post-meta-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 4px 6px;
            background: linear-gradient(0deg, rgba(0,0,0,0.7), transparent);
            color: #fff;
            font-size: 0.65rem;
            display: flex; justify-content: space-between;
            opacity: 0.95;
        }

        /* Rooms list */
        .room-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex; gap: 12px; align-items: center;
        }
        .room-card .room-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1.2rem; flex-shrink: 0;
        }
        .room-card .room-info { flex: 1; min-width: 0; }
        .room-card .room-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
        .room-card .room-meta { font-size: 0.78rem; color: var(--text-muted); }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .empty-state i { font-size: 2.2rem; margin-bottom: 12px; opacity: 0.5; }
        .empty-state p { font-size: 0.88rem; margin: 0; }

        /* Spinner */
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(236, 72, 153, 0.2);
            border-top-color: var(--pink);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ==================== FAB (own profile only) ==================== */
        .fab {
            position: fixed;
            bottom: 24px; right: 24px;
            width: 56px; height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            border: none;
            color: #fff;
            font-size: 1.4rem;
            box-shadow: 0 6px 18px rgba(236, 72, 153, 0.45);
            z-index: 30;
            display: none;
            align-items: center; justify-content: center;
            transition: transform 0.15s ease;
        }
        .fab:hover { transform: scale(1.06); }
        .fab:active { transform: scale(0.94); }
        .fab.own { display: inline-flex; }

        /* ==================== ⋮ MENU (other user only) ==================== */
        .menu-dropdown {
            position: absolute;
            top: 50px; right: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            padding: 6px;
            min-width: 180px;
            z-index: 60;
            display: none;
        }
        .menu-dropdown.open { display: block; }
        .menu-item {
            display: flex; align-items: center; gap: 10px;
            width: 100%;
            padding: 10px 12px;
            background: transparent; border: none;
            color: var(--text);
            font-size: 0.85rem; font-weight: 600;
            border-radius: 8px;
            text-align: left;
        }
        .menu-item:hover { background: var(--bg-card-2); }
        .menu-item.danger { color: var(--red); }
        .menu-item i { width: 18px; text-align: center; }

        /* ==================== TOAST ==================== */
        .toast-container {
            position: fixed;
            bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 200;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: none;
            max-width: 90vw;
        }
        .toast {
            background: var(--bg-card);
            color: var(--text);
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 0.86rem; font-weight: 600;
            border: 1px solid var(--border);
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            animation: toastIn 0.25s ease;
            pointer-events: auto;
        }
        .toast.success { border-color: var(--green); color: var(--green); }
        .toast.error { border-color: var(--red); color: var(--red); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ==================== AUTH GATE ==================== */
        .auth-gate {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg);
            z-index: 100;
            text-align: center;
            padding: 20px;
        }
        .auth-gate .auth-card {
            max-width: 360px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px 22px;
        }
        .auth-gate h2 { margin: 0 0 8px; font-size: 1.2rem; }
        .auth-gate p { margin: 0 0 18px; color: var(--text-muted); font-size: 0.9rem; }
        .auth-gate .main-btn {
            display: inline-block;
            padding: 11px 22px;
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: #fff; font-weight: 700;
            border-radius: 12px; border: none;
            text-decoration: none;
        }

        /* ==================== RESPONSIVE TWEAKS ==================== */
        @media (min-width: 640px) {
            .cover-wrap { height: 260px; }
            :root { --avatar-size: 140px; }
            .display-name { font-size: 26px; }
        }
        @media (min-width: 1024px) {
            .cover-wrap { height: 320px; }
            .top-header, .tabs-bar, .tab-content { max-width: 920px; margin-left: auto; margin-right: auto; }
            .cover-wrap { max-width: 920px; margin: 0 auto; }
            .avatar-wrap { margin-top: calc(var(--avatar-size) / -2); }
        }

        /* ==================== REDUCED MOTION ==================== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
            .avatar-ring { animation: none !important; box-shadow: 0 0 12px rgba(251, 191, 36, 0.5); }
            .tab-content { animation: none !important; }
        }

        /* Hidden helper */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- ==================== TOP HEADER ==================== -->
    <header class="top-header" role="banner">
        <button class="icon-btn" id="back-btn" aria-label="Go back">
            <i class="fas fa-arrow-left"></i>
        </button>
        <span class="page-title">Profile</span>
        <button class="icon-btn" id="menu-trigger" aria-label="More options" aria-haspopup="true" aria-expanded="false">
            <i class="fas fa-ellipsis-vertical"></i>
        </button>
    </header>

    <!-- ⋮ Menu (other users only) -->
    <div class="menu-dropdown" id="menu-dropdown" role="menu" aria-label="Profile actions">
        <button class="menu-item" id="menu-share" role="menuitem"><i class="fas fa-share-nodes"></i> Share Profile</button>
        <button class="menu-item" id="menu-report" role="menuitem"><i class="fas fa-flag"></i> Report User</button>
        <button class="menu-item danger" id="menu-block" role="menuitem"><i class="fas fa-ban"></i> Block User</button>
    </div>

    <!-- ==================== AUTH GATE (shown until auth resolves) ==================== -->
    <div class="auth-gate hidden" id="auth-gate">
        <div class="auth-card">
            <h2>Sign in required</h2>
            <p>You need to be signed in to view profiles.</p>
            <a href="index.html" class="main-btn">Go to sign in</a>
        </div>
    </div>

    <!-- ==================== PROFILE BODY ==================== -->
    <main id="profile-body" aria-label="Profile">
        <!-- Cover -->
        <div class="cover-wrap" id="cover" role="img" aria-label="Cover photo">
            <button class="cover-edit-btn" id="cover-edit-btn" aria-label="Change cover photo">
                <i class="fas fa-camera"></i> Edit Cover
            </button>
        </div>

        <!-- Avatar -->
        <div class="avatar-wrap">
            <div class="avatar-ring hidden" id="avatar-ring" aria-hidden="true"></div>
            <img class="avatar-img" id="avatar" src="logo.png" alt="Profile photo">
            <div class="verified-badge hidden" id="verified" aria-label="Verified user">
                <i class="fas fa-circle-check"></i>
            </div>
        </div>

        <!-- Identity -->
        <div class="identity-block">
            <h1 class="display-name" id="display-name">User</h1>
            <p class="username" id="username">@user</p>
            <div class="bio-block" id="bio" aria-live="polite"></div>
            <button class="bio-read-more hidden" id="bio-read-more" aria-expanded="false">Read more</button>
        </div>

        <!-- Badges row -->

            </button>
            <button class="tab-btn" role="tab" aria-selected="false" aria-controls="tab-posts" data-tab="posts" id="tabbtn-posts">

        <!-- Tab content -->

            <div id="rooms-content"></div>

    <!-- FAB (own profile only) -->
    <button class="fab" id="create-post-fab" aria-label="Create new post">
        <i class="fas fa-plus"></i>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Hidden file inputs for own-profile editing -->
    <input type="file" id="avatar-file" accept="image/*" class="hidden">
    <input type="file" id="cover-file" accept="image/*" class="hidden">

    <!-- ============================================================
         FIREBASE INIT (same project as index.html)
         ============================================================ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import {
            getFirestore, doc, getDoc, getDocs, setDoc, updateDoc, deleteDoc,
            collection, query, where, orderBy, limit, addDoc, increment, writeBatch,
            arrayUnion, arrayRemove
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr9Bfn4Ep-qw9JFkguyak00dsN90GSgRY",
            authDomain: "mr-chatting-ff2b6.firebaseapp.com",
            projectId: "mr-chatting-ff2b6",
            storageBucket: "mr-chatting-ff2b6.firebasestorage.app",
            messagingSenderId: "710151594912",
            appId: "1:710151594912:web:bc2861e503db1481223ac5",
            measurementId: "G-NNXG57V3KL"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ============ STATE ============
        let currentUser = null;
        let currentUserData = null;
        let targetUid = null;
        let targetData = null;
        let isOwnProfile = false;
        let activeTab = 'about';

        // ============ HELPERS ============
        function escapeHtml(s) {
            if (s === null || s === undefined) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        function escapeAttr(s) { return escapeHtml(s); }
        function getAvatarUrl(seed) {
            return `https://api.dicebear.com/7.x/avataaars/svg?seed=${encodeURIComponent(seed || 'user')}`;
        }
        function safePhoto(url, seed) {
            if (!url) return getAvatarUrl(seed);
            if (typeof url === 'string' && url.startsWith('data:image/')) return url;
            if (typeof url === 'string' && url.startsWith('http')) return url;
            return getAvatarUrl(seed);
        }
        function showToast(msg, type = 'info') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.25s'; setTimeout(() => t.remove(), 300); }, 2800);
        }
        function formatTimeAgo(ts) {
            if (!ts) return '';
            const ms = (ts.toMillis && typeof ts.toMillis === 'function') ? ts.toMillis() : (typeof ts === 'number' ? ts : Date.now());
            const diff = Date.now() - ms;
            const m = Math.floor(diff / 60000);
            if (m < 1) return 'just now';
            if (m < 60) return `${m}m`;
            const h = Math.floor(m / 60);
            if (h < 24) return `${h}h`;
            const d = Math.floor(h / 24);
            if (d < 7) return `${d}d`;
            return new Date(ms).toLocaleDateString();
        }
        function formatJoined(ts) {
            if (!ts) return '—';
            try {
                const d = (ts.toDate && typeof ts.toDate === 'function') ? ts.toDate() : new Date(ts);
                return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            } catch (e) { return '—'; }
        }

        // ============ AUTH GATE ============
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                document.getElementById('auth-gate').classList.remove('hidden');
                document.getElementById('profile-body').style.display = 'none';
                return;
            }
            currentUser = user;
            // Get current user's data
            try {
                const snap = await getDoc(doc(db, 'users', user.uid));
                currentUserData = snap.exists() ? snap.data() : {};
            } catch (e) { currentUserData = {}; }
            // Determine target UID from URL param
            const params = new URLSearchParams(window.location.search);
            targetUid = params.get('uid') || user.uid;
            isOwnProfile = (targetUid === user.uid);
            loadProfile();
        });

        // ============ LOAD PROFILE ============
        async function loadProfile() {
            try {
                const snap = await getDoc(doc(db, 'users', targetUid));
                if (!snap.exists()) {
                    showToast('User not found.', 'error');
                    setTimeout(() => window.location.href = 'index.html', 1200);
                    return;
                }
                targetData = snap.data();
                renderProfile();
                // Load tab content
                await switchTab('about');
            } catch (e) {
                console.error('loadProfile error:', e);
                showToast('Could not load profile.', 'error');
            }
        }

        function renderProfile() {
            const d = targetData;
            // Cover
            const coverEl = document.getElementById('cover');
            if (d.coverPhoto) coverEl.style.background = `url('${escapeAttr(d.coverPhoto)}') center/cover no-repeat`;
            else coverEl.style.background = 'linear-gradient(135deg, var(--pink), var(--purple))';

            // Avatar
            document.getElementById('avatar').src = safePhoto(d.photoURL, d.username || targetUid);

            // Verified badge
            document.getElementById('verified').classList.toggle('hidden', !(d.isVerified || d.isEmailVerified));

            // Avatar golden glow ring for premium users
            const isPremium = d.isPremium || (d.badges && d.badges.includes && d.badges.includes('premium'));
            document.getElementById('avatar-ring').classList.toggle('hidden', !isPremium);

            // Name + username + bio
            document.getElementById('display-name').textContent = d.fullName || d.username || 'User';
            document.getElementById('username').textContent = '@' + (d.username || 'user');

            const bioEl = document.getElementById('bio');
            bioEl.textContent = d.bio || 'No bio yet';
            // Show "Read more" only if bio is long (more than 3 lines visually)
            requestAnimationFrame(() => {
                const readMore = document.getElementById('bio-read-more');
                if (bioEl.scrollHeight > bioEl.clientHeight + 4) {
                    readMore.classList.remove('hidden');
                } else {
                    readMore.classList.add('hidden');
                }
            });

            // Badges
            renderBadges(d);

            // Stats
            document.getElementById('stat-posts').textContent = d.postsCount || d.postCount || 0;
            document.getElementById('stat-followers').textContent = d.followersCount || d.followerCount || 0;
            document.getElementById('stat-following').textContent = d.followingCount || 0;
            document.getElementById('stat-friends').textContent = d.friendsCount || 0;

            // Currency
            document.getElementById('gold-balance').textContent = (d.gold || 0).toLocaleString();
            document.getElementById('diamond-balance').textContent = (d.diamonds || 0).toLocaleString();

            // Actions
            renderActions();

            // Cover edit button (own profile only)
            document.getElementById('cover-edit-btn').classList.toggle('own', isOwnProfile);

            // FAB (own profile only)
            document.getElementById('create-post-fab').classList.toggle('own', isOwnProfile);

            // ⋮ menu (other users only)
            document.getElementById('menu-trigger').style.visibility = isOwnProfile ? 'hidden' : 'visible';

            // Tab visibility — "Saved" tab only visible on own profile
            const savedTab = document.getElementById('tabbtn-saved');
            savedTab.setAttribute('aria-disabled', isOwnProfile ? 'false' : 'true');
            if (!isOwnProfile) savedTab.style.display = 'none';
            else savedTab.style.display = '';
        }

        function renderBadges(d) {
            const container = document.getElementById('badges');
            const badges = [];
            // Implied badges based on user data flags
            if (d.isVerified || d.isEmailVerified) badges.push({ cls: 'verified', icon: 'fa-circle-check', text: 'Verified' });
            if (d.isEarlyUser) badges.push({ cls: 'early', icon: 'fa-rocket', text: 'Early User' });
            if (d.isPremium) badges.push({ cls: 'premium', icon: 'fa-crown', text: 'Premium' });
            if (d.isEventWinner) badges.push({ cls: 'winner', icon: 'fa-trophy', text: 'Event Winner' });
            if ((d.gold || 0) >= 10000) badges.push({ cls: 'rich', icon: 'fa-coins', text: 'Gold Hoarder' });
            if (d.isRoomOwner) badges.push({ cls: 'owner', icon: 'fa-door-open', text: 'Room Owner' });
            if (d.role === 'admin' || d.isAdmin) badges.push({ cls: 'admin', icon: 'fa-shield-halved', text: 'Admin' });
            // Explicit badges array
            if (Array.isArray(d.badges)) {
                d.badges.forEach(b => {
                    if (typeof b === 'string' && !badges.find(x => x.text.toLowerCase() === b.toLowerCase())) {
                        badges.push({ cls: 'early', icon: 'fa-award', text: b });
                    }
                });
            }
            container.innerHTML = badges.map(b =>
                `<span class="badge-pill ${b.cls}"><i class="fas ${b.icon}" aria-hidden="true"></i> ${escapeHtml(b.text)}</span>`
            ).join('');
            if (badges.length === 0) container.innerHTML = '<span class="badge-pill" style="opacity:0.6;">No badges yet</span>';
        }

        async function renderActions() {
            const primaryBtn = document.getElementById('primary-action');
            const messageBtn = document.getElementById('message-action');
            const goldBtn = document.getElementById('gold-action');

            if (isOwnProfile) {
                primaryBtn.innerHTML = '<i class="fas fa-user-pen"></i> Edit Profile';
                primaryBtn.classList.remove('muted');
                primaryBtn.classList.add('primary');
                primaryBtn.setAttribute('aria-label', 'Edit your profile');
                primaryBtn.onclick = () => { window.location.href = 'index.html#edit-profile'; };
                messageBtn.style.display = 'none';
                goldBtn.style.display = 'none';
                return;
            }
            // Other user: show Follow/Following/Requested, Message, Send Gold
            messageBtn.style.display = '';
            goldBtn.style.display = '';
            messageBtn.innerHTML = '<i class="fas fa-comment"></i> Message';
            messageBtn.onclick = () => { window.location.href = `inbox.html?u=${targetUid}`; };
            goldBtn.innerHTML = '<i class="fas fa-coins"></i> Send Gold';
            goldBtn.onclick = () => { window.location.href = `inbox.html?gift=${targetUid}`; };

            // Follow state
            try {
                const fSnap = await getDoc(doc(db, 'follows', `${currentUser.uid}_${targetUid}`));
                if (fSnap.exists()) {
                    setFollowBtnState('following');
                } else {
                    // Check if there's a pending follow request (for private accounts)
                    const rSnap = await getDocs(query(collection(db, 'followRequests'),
                        where('from', '==', currentUser.uid), where('to', '==', targetUid), limit(1)));
                    if (!rSnap.empty) setFollowBtnState('requested');
                    else setFollowBtnState('follow');
                }
            } catch (e) {
                setFollowBtnState('follow');
            }
            primaryBtn.onclick = () => toggleFollow();
        }

        function setFollowBtnState(state) {
            const btn = document.getElementById('primary-action');
            btn.classList.remove('primary', 'muted');
            if (state === 'follow') {
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Follow';
                btn.classList.add('primary');
                btn.setAttribute('aria-label', 'Follow this user');
            } else if (state === 'following') {
                btn.innerHTML = '<i class="fas fa-user-check"></i> Following';
                btn.classList.add('muted');
                btn.setAttribute('aria-label', 'You are following this user. Click to unfollow.');
            } else if (state === 'requested') {
                btn.innerHTML = '<i class="fas fa-clock"></i> Requested';
                btn.classList.add('muted');
                btn.setAttribute('aria-label', 'Follow request sent');
            }
            btn.dataset.state = state;
        }

        async function toggleFollow() {
            if (!currentUser || !targetUid) return;
            const btn = document.getElementById('primary-action');
            const state = btn.dataset.state || 'follow';
            try {
                const followRef = doc(db, 'follows', `${currentUser.uid}_${targetUid}`);
                if (state === 'following') {
                    // Unfollow
                    await deleteDoc(followRef);
                    try { await updateDoc(doc(db, 'users', currentUser.uid), { followingCount: increment(-1) }); } catch (e) {}
                    try { await updateDoc(doc(db, 'users', targetUid), { followerCount: increment(-1) }); } catch (e) {}
                    setFollowBtnState('follow');
                    showToast('Unfollowed');
                } else {
                    // Follow (direct — assumes public profile)
                    await setDoc(followRef, {
                        followerId: currentUser.uid, followingId: targetUid,
                        follower: currentUser.uid, following: targetUid,
                        timestamp: Date.now()
                    });
                    try { await updateDoc(doc(db, 'users', currentUser.uid), { followingCount: increment(1) }); } catch (e) {}
                    try { await updateDoc(doc(db, 'users', targetUid), { followerCount: increment(1) }); } catch (e) {}
                    // Notify
                    try {
                        await addDoc(collection(db, 'notifications'), {
                            userId: targetUid, type: 'follow', actorId: currentUser.uid,
                            actorName: currentUserData?.fullName || currentUserData?.username || 'Someone',
                            actorPhoto: currentUserData?.photoURL || '',
                            text: `${currentUserData?.fullName || currentUserData?.username || 'Someone'} started following you`,
                            targetType: 'user', targetId: currentUser.uid,
                            read: false, timestamp: Date.now()
                        });
                    } catch (e) {}
                    setFollowBtnState('following');
                    showToast('Followed!', 'success');
                }
                // Refresh stats
                const snap = await getDoc(doc(db, 'users', targetUid));
                if (snap.exists()) {
                    targetData = snap.data();
                    document.getElementById('stat-followers').textContent = targetData.followersCount || targetData.followerCount || 0;
                }
            } catch (e) {
                console.error('toggleFollow error:', e);
                showToast('Could not update follow status.', 'error');
            }
        }

        // ============ TAB SWITCHING ============
        async function switchTab(tab) {
            activeTab = tab;
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(b => {
                const isActive = b.dataset.tab === tab;
                b.classList.toggle('active', isActive);
                b.setAttribute('aria-selected', isActive ? 'true' : 'false');
            });
            // Hide all panels, show selected
            ['about', 'posts', 'rooms', 'saved'].forEach(t => {
                const panel = document.getElementById(`tab-${t}`);
                if (panel) panel.classList.toggle('hidden', t !== tab);
            });
            // Lazy-load content
            const contentEl = document.getElementById(`${tab}-content`);
            if (!contentEl) return;
            contentEl.innerHTML = '<div class="spinner" role="status" aria-label="Loading"></div>';
            try {
                if (tab === 'about') await renderAboutTab();
                else if (tab === 'posts') await renderPostsTab();
                else if (tab === 'rooms') await renderRoomsTab();
                else if (tab === 'saved') await renderSavedTab();
            } catch (e) {
                console.error(`renderTab(${tab}) error:`, e);
                contentEl.innerHTML = `<div class="empty-state"><i class="fas fa-triangle-exclamation"></i><p>Failed to load.</p></div>`;
            }
        }

        async function renderAboutTab() {
            const d = targetData;
            const interests = Array.isArray(d.interests) ? d.interests.slice(0, 10) : [];
            const interestsHtml = interests.length > 0
                ? `<div class="interests-grid">${interests.map(i => `<span class="interest-chip">${escapeHtml(String(i))}</span>`).join('')}</div>`
                : '<span class="val" style="color:var(--text-muted);">No interests added</span>';
            const html = `
                <div class="info-item">
                    <i class="fas fa-location-dot" aria-hidden="true"></i>
                    <span class="lbl">Location</span>
                    <span class="val">${escapeHtml(d.from || d.location || 'Not added')}</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-briefcase" aria-hidden="true"></i>
                    <span class="lbl">Profession</span>
                    <span class="val">${escapeHtml(d.profession || 'Not added')}</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-cake-candles" aria-hidden="true"></i>
                    <span class="lbl">Age</span>
                    <span class="val">${escapeHtml(d.age ? String(d.age) : 'Not added')}</span>
                </div>
                <div class="info-item">
                    <i class="fas fa-heart" aria-hidden="true"></i>
                    <span class="lbl">Interests</span>
                    ${interestsHtml}
                </div>
                <div class="info-item">
                    <i class="fas fa-calendar" aria-hidden="true"></i>
                    <span class="lbl">Joined</span>
                    <span class="val">${formatJoined(d.accountCreated)}</span>
                </div>
            `;
            document.getElementById('about-content').innerHTML = html;
        }

        async function renderPostsTab() {
            const container = document.getElementById('posts-content');
            try {
                const snap = await getDocs(query(
                    collection(db, 'posts'),
                    where('userId', '==', targetUid),
                    orderBy('timestamp', 'desc'),
                    limit(60)
                ));
                if (snap.empty) {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-newspaper"></i><p>No posts yet.</p></div>`;
                    return;
                }
                container.innerHTML = '<div class="posts-grid">' + snap.docs.map(p => {
                    const data = p.data();
                    const text = (data.text || '').slice(0, 120);
                    const media = (data.mediaUrls && data.mediaUrls[0]) || data.imageUrl || data.media;
                    const inner = media
                        ? `<img src="${escapeAttr(media)}" alt="Post media" loading="lazy" decoding="async" onerror="this.style.display='none'; this.parentElement.innerHTML='${escapeAttr(escapeHtml(text)) || 'Post'}'">`
                        : escapeHtml(text || 'Post');
                    return `<div class="post-thumb" data-pid="${p.id}" role="button" tabindex="0" aria-label="Post: ${escapeAttr(text.slice(0,80))}">${inner}</div>`;
                }).join('') + '</div>';
                // Click → go to feed with post highlighted
                container.querySelectorAll('.post-thumb').forEach(el => {
                    el.addEventListener('click', () => {
                        const pid = el.dataset.pid;
                        window.location.href = `feed.html#post-${pid}`;
                    });
                    el.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
                    });
                });
            } catch (e) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-triangle-exclamation"></i><p>Failed to load posts.</p></div>`;
            }
        }

        async function renderRoomsTab() {
            const container = document.getElementById('rooms-content');
            const joined = Array.isArray(targetData.joinedCommunities) ? targetData.joinedCommunities : [];
            if (joined.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-door-open"></i><p>Not a member of any rooms.</p></div>`;
                return;
            }
            try {
                const rooms = [];
                for (const cid of joined) {
                    const cSnap = await getDoc(doc(db, 'communities', cid));
                    if (cSnap.exists()) rooms.push({ id: cSnap.id, ...cSnap.data() });
                }
                if (rooms.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-door-open"></i><p>Not a member of any rooms.</p></div>`;
                    return;
                }
                container.innerHTML = rooms.map(c => {
                    const isMember = (currentUserData?.joinedCommunities || []).includes(c.id);
                    return `<div class="room-card">
                        <div class="room-icon"><i class="fas fa-people-group"></i></div>
                        <div class="room-info">
                            <div class="room-name">${escapeHtml(c.name || 'Room')}</div>
                            <div class="room-meta">${c.membersCount || 0} members · ${escapeHtml(c.category || 'general')}</div>
                        </div>
                        <button class="action-btn ${isMember ? 'muted' : 'primary'}" data-rid="${c.id}" aria-label="${isMember ? 'Leave room' : 'Join room'}">
                            ${isMember ? '<i class="fas fa-check"></i> Joined' : '<i class="fas fa-plus"></i> Join'}
                        </button>
                    </div>`;
                }).join('');
                container.querySelectorAll('button[data-rid]').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const rid = btn.dataset.rid;
                        const isMember = (currentUserData?.joinedCommunities || []).includes(rid);
                        try {
                            const userRef = doc(db, 'users', currentUser.uid);
                            const roomRef = doc(db, 'communities', rid);
                            const batch = writeBatch(db);
                            if (isMember) {
                                batch.update(userRef, { joinedCommunities: arrayRemove(rid) });
                                batch.update(roomRef, { membersCount: increment(-1) });
                            } else {
                                batch.update(userRef, { joinedCommunities: arrayUnion(rid) });
                                batch.update(roomRef, { membersCount: increment(1) });
                            }
                            await batch.commit();
                            // Update local cache
                            if (currentUserData) {
                                currentUserData.joinedCommunities = currentUserData.joinedCommunities || [];
                                if (isMember) currentUserData.joinedCommunities = currentUserData.joinedCommunities.filter(x => x !== rid);
                                else currentUserData.joinedCommunities.push(rid);
                            }
                            showToast(isMember ? 'Left room' : 'Joined room', 'success');
                            renderRoomsTab();
                        } catch (e) {
                            showToast('Failed.', 'error');
                        }
                    });
                });
            } catch (e) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-triangle-exclamation"></i><p>Failed to load rooms.</p></div>`;
            }
        }

        async function renderSavedTab() {
            const container = document.getElementById('saved-content');
            if (!isOwnProfile) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i><p>Saved posts are only visible to you.</p></div>`;
                return;
            }
            try {
                const snap = await getDocs(query(
                    collection(db, 'savedPosts'),
                    where('userId', '==', currentUser.uid),
                    orderBy('savedAt', 'desc'),
                    limit(60)
                ));
                if (snap.empty) {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-bookmark"></i><p>No saved posts yet.</p></div>`;
                    return;
                }
                const posts = [];
                for (const d of snap.docs) {
                    const pSnap = await getDoc(doc(db, 'posts', d.data().postId));
                    if (pSnap.exists()) posts.push({ id: pSnap.id, ...pSnap.data() });
                }
                if (posts.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-bookmark"></i><p>No saved posts yet.</p></div>`;
                    return;
                }
                container.innerHTML = '<div class="posts-grid">' + posts.map(p => {
                    const text = (p.text || '').slice(0, 120);
                    const media = (p.mediaUrls && p.mediaUrls[0]) || p.imageUrl || p.media;
                    const inner = media
                        ? `<img src="${escapeAttr(media)}" alt="Saved post media" loading="lazy" decoding="async">`
                        : escapeHtml(text || 'Post');
                    return `<div class="post-thumb" data-pid="${p.id}" role="button" tabindex="0" aria-label="Saved post: ${escapeAttr(text.slice(0,80))}">${inner}</div>`;
                }).join('') + '</div>';
                container.querySelectorAll('.post-thumb').forEach(el => {
                    el.addEventListener('click', () => {
                        window.location.href = `feed.html#post-${el.dataset.pid}`;
                    });
                    el.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
                    });
                });
            } catch (e) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-triangle-exclamation"></i><p>Failed to load saved posts.</p></div>`;
            }
        }

        // ============ EVENT WIRING ============
        // Tab buttons
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            btn.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
                    e.preventDefault();
                    const tabs = Array.from(document.querySelectorAll('.tab-btn'));
                    const idx = tabs.indexOf(btn);
                    const next = e.key === 'ArrowRight' ? (idx + 1) % tabs.length : (idx - 1 + tabs.length) % tabs.length;
                    tabs[next].focus();
                    switchTab(tabs[next].dataset.tab);
                }
            });
        });

        // Bio read more
        document.getElementById('bio-read-more').addEventListener('click', function() {
            const bio = document.getElementById('bio');
            const expanded = bio.classList.toggle('expanded');
            this.textContent = expanded ? 'Show less' : 'Read more';
            this.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        });

        // Back button
        document.getElementById('back-btn').addEventListener('click', () => {
            if (window.history.length > 1) window.history.back();
            else window.location.href = 'index.html';
        });

        // FAB → create post (go to feed with new post composer)
        document.getElementById('create-post-fab').addEventListener('click', () => {
            window.location.href = 'feed.html?compose=1';
        });

        // ⋮ Menu toggle
        const menuTrigger = document.getElementById('menu-trigger');
        const menuDropdown = document.getElementById('menu-dropdown');
        menuTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            const open = menuDropdown.classList.toggle('open');
            menuTrigger.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
        document.addEventListener('click', (e) => {
            if (!menuDropdown.contains(e.target) && e.target !== menuTrigger) {
                menuDropdown.classList.remove('open');
                menuTrigger.setAttribute('aria-expanded', 'false');
            }
        });

        // Menu items
        document.getElementById('menu-share').addEventListener('click', () => {
            menuDropdown.classList.remove('open');
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: 'MR Chat Profile', url }).catch(() => {});
            } else if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(() => showToast('Link copied!', 'success'));
            } else {
                showToast('Copy this URL: ' + url, 'info');
            }
        });
        document.getElementById('menu-report').addEventListener('click', () => {
            menuDropdown.classList.remove('open');
            // Submit a report document to Firestore
            const reason = prompt('Why are you reporting this user?');
            if (!reason) return;
            addDoc(collection(db, 'reports'), {
                targetType: 'user', targetId: targetUid,
                reporterId: currentUser.uid,
                reporterName: currentUserData?.fullName || currentUserData?.username || 'User',
                reason, status: 'pending', timestamp: Date.now()
            }).then(() => showToast('Report submitted. Thank you!', 'success'))
              .catch(() => showToast('Failed to submit report.', 'error'));
        });
        document.getElementById('menu-block').addEventListener('click', async () => {
            menuDropdown.classList.remove('open');
            if (!confirm('Block this user? They will not be able to message you.')) return;
            try {
                // Add targetUid to currentUser's blockedUsers array
                const userRef = doc(db, 'users', currentUser.uid);
                const userSnap = await getDoc(userRef);
                const blocked = (userSnap.exists() && userSnap.data().blockedUsers) || [];
                if (!blocked.includes(targetUid)) blocked.push(targetUid);
                await updateDoc(userRef, { blockedUsers: blocked });
                showToast('User blocked.', 'success');
                setTimeout(() => window.location.href = 'index.html', 1000);
            } catch (e) {
                showToast('Failed to block user.', 'error');
            }
        });

        // Cover edit (own profile only)
        document.getElementById('cover-edit-btn').addEventListener('click', () => {
            if (!isOwnProfile) return;
            document.getElementById('cover-file').click();
        });
        document.getElementById('cover-file').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) { showToast('Cover must be under 2MB.', 'error'); return; }
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const base64 = ev.target.result;
                try {
                    await updateDoc(doc(db, 'users', currentUser.uid), { coverPhoto: base64 });
                    document.getElementById('cover').style.background = `url('${base64}') center/cover no-repeat`;
                    showToast('Cover updated!', 'success');
                } catch (err) { showToast('Failed to update cover.', 'error'); }
            };
            reader.readAsDataURL(file);
        });

        // Avatar click (own profile only) — change avatar
        document.getElementById('avatar').addEventListener('click', () => {
            if (!isOwnProfile) return;
            document.getElementById('avatar-file').click();
        });
        document.getElementById('avatar-file').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) { showToast('Avatar must be under 2MB.', 'error'); return; }
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const base64 = ev.target.result;
                try {
                    await updateDoc(doc(db, 'users', currentUser.uid), { photoURL: base64 });
                    document.getElementById('avatar').src = base64;
                    showToast('Avatar updated!', 'success');
                } catch (err) { showToast('Failed to update avatar.', 'error'); }
            };
            reader.readAsDataURL(file);
        });

        // Escape closes menu
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                menuDropdown.classList.remove('open');
                menuTrigger.setAttribute('aria-expanded', 'false');
            }
        });

        console.log('✅ profile.html loaded (full-screen profile page)');
    </script>
</body>
</html>
