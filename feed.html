    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import {
            getFirestore, doc, setDoc, getDoc, getDocs, updateDoc, deleteDoc,
            collection, query, where, onSnapshot, addDoc, increment,
            limit, writeBatch
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr9Bfn4Ep-qw9JFkguyak00dsN90GSgRY",
            authDomain: "mr-chatting-ff2b6.firebaseapp.com",
            projectId: "mr-chatting-ff2b6",
            storageBucket: "mr-chatting-ff2b6.firebasestorage.app",
            messagingSenderId: "710151594912",
            appId: "1:710151594912:web:bc2861e503db1481223ac5",
            measurementId: "G-NNXG57V3KL"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ===== STATE =====
        let currentUser = null;
        let currentUserData = null;
        let postsUnsub = null;
        let storiesUnsub = null;
        let commentsUnsub = null;
        let activePostId = null;
        let activeCommentParentId = null;
        let storyQueue = [];
        let currentStoryIndex = 0;
        let storyTimer = null;
        let storyProgressTimer = null;
        let selectedPostImages = [];
        let selectedStoryImage = null;
        let oldestPostTimestamp = null;
        let isLoadingMore = false;
        let hasMorePosts = true;
        let savedPosts = JSON.parse(localStorage.getItem('mr_saved_posts') || '[]');
        const POSTS_PER_PAGE = 10;
        const REACTION_TYPES = { heart: '❤️', like: '👍', laugh: '😂', wow: '😮', sad: '😢', angry: '😡' };
        const REACTION_KEYS = Object.keys(REACTION_TYPES);
        const DEFAULT_AVATAR = 'https://api.dicebear.com/7.x/adventurer/svg?seed=';

        // ===== THEME SYSTEM =====
        const savedTheme = localStorage.getItem('mr_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon();

        window.toggleTheme = function() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('mr_theme', next);
            updateThemeIcon();
            showToast(`${next === 'dark' ? 'Dark' : 'Light'} mode activated`, 'success');
        };

        function updateThemeIcon() {
            const icon = document.getElementById('theme-icon');
            const current = document.documentElement.getAttribute('data-theme');
            if (icon) icon.className = current === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
        }

        // ===== AUTH =====
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            try {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if (userSnap.exists()) {
                    currentUserData = userSnap.data();
                    updateHeaderUI();
                    initFeed();
                } else {
                    showToast('User data not found', 'error');
                }
            } catch (e) {
                console.error('[Auth] Error:', e);
                showToast('Failed to load user data', 'error');
            }
        });

        function updateHeaderUI() {
            const photo = currentUserData?.photoURL || currentUser?.photoURL || `${DEFAULT_AVATAR}${currentUser?.uid}`;
            document.getElementById('header-avatar').src = photo;
            document.getElementById('create-bar-avatar').src = photo;
            document.getElementById('modal-user-avatar').src = photo;
            document.getElementById('modal-user-name').innerText = currentUserData?.fullName || currentUser?.displayName || 'User';
            document.getElementById('comment-modal-avatar').src = photo;
        }

        // ===== INITIALIZATION =====
        async function initFeed() {
            document.getElementById('loading-screen').classList.add('hidden');
            loadPosts();
            loadStories();
            setupInfiniteScroll();
        }

        document.getElementById('refresh-btn').addEventListener('click', () => {
            oldestPostTimestamp = null;
            hasMorePosts = true;
            document.getElementById('feed-container').innerHTML = '';
            loadPosts();
            loadStories();
            showToast('Feed refreshed', 'success');
        });

        // ===== STORIES =====
        async function loadStories() {
            try {
                if (storiesUnsub) { storiesUnsub(); storiesUnsub = null; }
                const twentyFourHoursAgo = Date.now() - (24 * 60 * 60 * 1000);
                const q = query(collection(db, "stories"), where("timestamp", ">", twentyFourHoursAgo));
                storiesUnsub = onSnapshot(q, (snap) => {
                    const sortedDocs = snap.docs.sort((a, b) => (b.data().timestamp || 0) - (a.data().timestamp || 0));
                    const storiesByUser = new Map();
                    sortedDocs.forEach(d => {
                        const data = d.data();
                        if (!data.userId) return;
                        if (!storiesByUser.has(data.userId)) {
                            storiesByUser.set(data.userId, { user: data, stories: [] });
                        }
                        storiesByUser.get(data.userId).stories.push({ id: d.id, ...data });
                    });
                    renderStories(storiesByUser);
                }, (err) => {
                    console.error('[Stories] Error:', err);
                    showStoriesError('Failed to load stories.');
                });
            } catch (err) {
                console.error('[Stories] Fatal:', err);
                showStoriesError('Failed to load stories.');
            }
        }

        function showStoriesError(msg) {
            const container = document.getElementById('stories-scroll');
            const myPhoto = currentUserData?.photoURL || currentUser?.photoURL || `${DEFAULT_AVATAR}me`;
            container.innerHTML = `
                <div class="story-item" onclick="openCreateStoryModal()">
                    <div class="story-ring own">
                        <img src="${myPhoto}" class="story-img" alt="Me" onerror="this.src='${DEFAULT_AVATAR}me'">
                        <div class="story-add-btn"><i class="fas fa-plus"></i></div>
                    </div>
                    <span class="story-name">Your Story</span>
                </div>
                <div style="display: flex; align-items: center; padding: 0 16px; color: var(--text-muted); font-size: 0.85rem; min-width: 200px;">
                    <i class="fas fa-exclamation-circle" style="margin-right: 8px; color: var(--danger);"></i>
                    ${msg}
                </div>
            `;
        }

        async function renderStories(storiesByUser) {
            try {
                const container = document.getElementById('stories-scroll');
                if (!container) return;
                let html = '';
                const myUid = currentUser?.uid || 'unknown';
                const myPhoto = currentUserData?.photoURL || currentUser?.photoURL || `${DEFAULT_AVATAR}${myUid}`;
                const myStories = storiesByUser.get(myUid);

                html += `
                    <div class="story-item" onclick="${myStories ? `openStoryViewer('${myUid}')` : 'openCreateStoryModal()'}">
                        <div class="story-ring ${myStories ? 'own' : ''}">
                            <img src="${myPhoto}" class="story-img" alt="Me" onerror="this.src='${DEFAULT_AVATAR}me'">
                            ${!myStories ? `<div class="story-add-btn"><i class="fas fa-plus"></i></div>` : ''}
                        </div>
                        <span class="story-name">Your Story</span>
                        ${myStories ? `<span class="story-time">${formatTimeAgo(myStories.stories[0].timestamp)}</span>` : ''}
                    </div>
                `;

                for (const [uid, data] of storiesByUser) {
                    if (uid === myUid) continue;
                    const userPhoto = data.user?.userPhoto || data.user?.photoURL || `${DEFAULT_AVATAR}${uid}`;
                    const userName = data.user?.userName || 'User';
                    const unseen = !data.stories.every(s => (s.views || []).includes(myUid));
                    const latestTime = data.stories[0].timestamp;
                    html += `
                        <div class="story-item" onclick="openStoryViewer('${uid}')">
                            <div class="story-ring ${unseen ? '' : 'seen'}">
                                <img src="${userPhoto}" class="story-img" alt="${escapeHtml(userName)}" onerror="this.src='${DEFAULT_AVATAR}${uid}'">
                            </div>
                            <span class="story-name">${escapeHtml(userName)}</span>
                            <span class="story-time">${formatTimeAgo(latestTime)}</span>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (err) {
                console.error('[Stories] Render error:', err);
            }
        }

        // ===== CREATE STORY =====
        window.openCreateStoryModal = function() {
            document.getElementById('create-story-modal').classList.remove('hidden');
            document.getElementById('story-caption').value = '';
            document.getElementById('story-preview-container').style.display = 'none';
            document.getElementById('story-select-btn').style.display = 'block';
            document.getElementById('story-submit-btn').style.display = 'none';
            selectedStoryImage = null;
        };
        window.closeCreateStoryModal = function() {
            document.getElementById('create-story-modal').classList.add('hidden');
        };

        document.getElementById('story-image-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const compressed = await compressImage(file, 800, 0.7);
            selectedStoryImage = compressed;
            document.getElementById('story-preview-img').src = compressed;
            document.getElementById('story-preview-container').style.display = 'block';
            document.getElementById('story-select-btn').style.display = 'none';
            document.getElementById('story-submit-btn').style.display = 'block';
        });

        window.submitStory = async function() {
            if (!selectedStoryImage) return;
            const caption = document.getElementById('story-caption').value.trim();
            const btn = document.getElementById('story-submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sharing...';

            try {
                await addDoc(collection(db, "stories"), {
                    userId: currentUser.uid,
                    userName: currentUserData?.fullName || currentUser?.displayName || 'User',
                    userPhoto: currentUserData?.photoURL || currentUser?.photoURL || `${DEFAULT_AVATAR}${currentUser.uid}`,
                    image: selectedStoryImage,
                    caption: caption,
                    timestamp: Date.now(),
                    views: [],
                    expiresAt: Date.now() + (24 * 60 * 60 * 1000)
                });
                showToast('Story shared!', 'success');
                closeCreateStoryModal();
                selectedStoryImage = null;
            } catch(e) {
                showToast('Failed to share story', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Share to Story';
            }
        };

        // ===== STORY VIEWER - FIXED =====
        window.openStoryViewer = async function(userId) {
            try {
                const twentyFourHoursAgo = Date.now() - (24 * 60 * 60 * 1000);
                const q = query(collection(db, "stories"), where("userId", "==", userId), limit(50));
                const snap = await getDocs(q);
                if (snap.empty) {
                    showToast('No active stories', 'info');
                    return;
                }
                const filteredDocs = snap.docs
                    .filter(d => (d.data().timestamp || 0) > twentyFourHoursAgo)
                    .sort((a, b) => (a.data().timestamp || 0) - (b.data().timestamp || 0));
                if (filteredDocs.length === 0) {
                    showToast('No active stories', 'info');
                    return;
                }
                storyQueue = filteredDocs.map(d => ({ id: d.id, ...d.data() }));
                currentStoryIndex = 0;
                document.getElementById('story-viewer').classList.remove('hidden');
                showCurrentStory();
            } catch (err) {
                console.error('[StoryViewer] Error:', err);
                showToast('Failed to load stories', 'error');
            }
        };

        function showCurrentStory() {
            if (currentStoryIndex >= storyQueue.length) {
                closeStoryViewer();
                return;
            }
            const story = storyQueue[currentStoryIndex];
            
            // FIXED: Always reset image display before setting src
            const img = document.getElementById('sv-image');
            img.style.display = 'block';
            img.style.opacity = '0';
            img.src = story.image || '';
            
            // Fade in when loaded
            img.onload = () => { img.style.opacity = '1'; };
            img.onerror = () => { 
                img.style.display = 'none'; 
            };

            document.getElementById('sv-avatar').src = story.userPhoto || `${DEFAULT_AVATAR}${story.userId}`;
            document.getElementById('sv-name').innerText = story.userName;
            document.getElementById('sv-caption').innerText = story.caption || '';
            document.getElementById('sv-caption').style.display = story.caption ? 'block' : 'none';
            document.getElementById('sv-time').innerText = formatTimeAgo(story.timestamp);

            const deleteBtn = document.getElementById('sv-delete-btn');
            if (story.userId === currentUser?.uid) {
                deleteBtn.classList.remove('hidden');
            } else {
                deleteBtn.classList.add('hidden');
            }

            const pb = document.getElementById('story-progress-bar');
            pb.innerHTML = storyQueue.map((_, i) => `
                <div class="story-progress-segment">
                    <div class="story-progress-fill" id="sp-${i}" style="width: ${i < currentStoryIndex ? '100%' : (i > currentStoryIndex ? '0%' : '0%')}"></div>
                </div>
            `).join('');

            if (story.userId !== currentUser.uid && !(story.views || []).includes(currentUser.uid)) {
                updateDoc(doc(db, "stories", story.id), {
                    views: [...(story.views || []), currentUser.uid]
                }).catch(()=>{});
            }

            clearTimeout(storyTimer);
            clearInterval(storyProgressTimer);
            let progress = 0;
            const duration = 5000;
            const interval = 50;
            storyProgressTimer = setInterval(() => {
                progress += interval;
                const pct = Math.min((progress / duration) * 100, 100);
                const fill = document.getElementById(`sp-${currentStoryIndex}`);
                if (fill) fill.style.width = pct + '%';
            }, interval);
            storyTimer = setTimeout(() => { nextStory(); }, duration);
        }

        window.nextStory = function() {
            clearTimeout(storyTimer);
            clearInterval(storyProgressTimer);
            currentStoryIndex++;
            showCurrentStory();
        };
        window.prevStory = function() {
            clearTimeout(storyTimer);
            clearInterval(storyProgressTimer);
            if (currentStoryIndex > 0) currentStoryIndex--;
            showCurrentStory();
        };
        window.closeStoryViewer = function() {
            clearTimeout(storyTimer);
            clearInterval(storyProgressTimer);
            document.getElementById('story-viewer').classList.add('hidden');
            storyQueue = [];
            currentStoryIndex = 0;
        };

        window.deleteCurrentStory = async function() {
            if (!storyQueue[currentStoryIndex]) return;
            const story = storyQueue[currentStoryIndex];
            if (story.userId !== currentUser?.uid) return;
            if (!confirm('Delete this story?')) return;
            try {
                await deleteDoc(doc(db, "stories", story.id));
                showToast('Story deleted', 'success');
                storyQueue.splice(currentStoryIndex, 1);
                if (storyQueue.length === 0) {
                    closeStoryViewer();
                } else {
                    if (currentStoryIndex >= storyQueue.length) currentStoryIndex = storyQueue.length - 1;
                    showCurrentStory();
                }
            } catch(e) {
                showToast('Failed to delete', 'error');
            }
        };

        window.sendStoryReply = async function() {
            const input = document.getElementById('story-reply-input');
            const text = input.value.trim();
            if (!text || !storyQueue[currentStoryIndex]) return;
            const story = storyQueue[currentStoryIndex];
            try {
                await addDoc(collection(db, "messages"), {
                    senderId: currentUser.uid,
                    senderName: currentUserData?.fullName || currentUser?.displayName || 'User',
                    receiverId: story.userId,
                    text: `Replied to your story: "${text}"`,
                    timestamp: Date.now(),
                    type: 'story_reply'
                });
                showToast('Reply sent', 'success');
                input.value = '';
            } catch(e) {
                showToast('Failed to send reply', 'error');
            }
        };

        // ===== POSTS =====
        async function loadPosts() {
            if (isLoadingMore || !hasMorePosts) return;
            isLoadingMore = true;
            try {
                let q;
                if (oldestPostTimestamp) {
                    q = query(collection(db, "posts"), where("timestamp", "<", oldestPostTimestamp), limit(POSTS_PER_PAGE));
                } else {
                    q = query(collection(db, "posts"), limit(POSTS_PER_PAGE));
                }
                const snap = await getDocs(q);
                if (snap.empty) {
                    hasMorePosts = false;
                    if (!oldestPostTimestamp) {
                        document.getElementById('feed-container').innerHTML = `
                            <div style="text-align: center; padding: 70px 24px; color: var(--text-muted);">
                                <i class="fas fa-newspaper" style="font-size: 3.5rem; margin-bottom: 20px; opacity: 0.2;"></i>
                                <p style="font-size: 1rem; font-weight: 500;">No posts yet. Be the first to share!</p>
                            </div>
                        `;
                    }
                    isLoadingMore = false;
                    return;
                }
                const sortedDocs = snap.docs.sort((a, b) => (b.data().timestamp || 0) - (a.data().timestamp || 0));
                if (!oldestPostTimestamp) {
                    document.querySelectorAll('.post-skeleton').forEach(s => s.remove());
                }
                for (const d of sortedDocs) {
                    await renderPost({ id: d.id, ...d.data() });
                }
                const oldestDoc = sortedDocs[sortedDocs.length - 1];
                oldestPostTimestamp = oldestDoc.data().timestamp || 0;
                isLoadingMore = false;
            } catch (err) {
                console.error('[Feed] Error:', err);
                isLoadingMore = false;
                showToast('Failed to load posts', 'error');
            }
        }

        async function renderPost(post) {
            const container = document.getElementById('feed-container');
            if (!post.userId) post.userId = currentUser?.uid || 'unknown';
            if (!post.userName) post.userName = 'Unknown User';
            if (!post.userPhoto) post.userPhoto = `${DEFAULT_AVATAR}${post.userId}`;

            const isOwner = post.userId === currentUser?.uid;
            const timeAgo = formatTimeAgo(post.timestamp);
            const isSaved = savedPosts.includes(post.id);

            const reactionsSnap = await getDocs(query(collection(db, "reactions"), where("postId", "==", post.id)));
            const reactionCounts = {};
            let userReaction = null;
            reactionsSnap.forEach(d => {
                const r = d.data();
                reactionCounts[r.type] = (reactionCounts[r.type] || 0) + 1;
                if (r.userId === currentUser.uid) userReaction = r.type;
            });

            const commentsSnap = await getDocs(query(collection(db, "comments"), where("postId", "==", post.id)));
            const commentsCount = commentsSnap.size;

            const reactionBadges = Object.entries(reactionCounts)
                .filter(([_, count]) => count > 0)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3)
                .map(([type, count]) => `<span class="reaction-badge">${REACTION_TYPES[type]}</span>`).join('');

            const totalReactions = Object.values(reactionCounts).reduce((a, b) => a + b, 0);

            let imagesHtml = '';
            if (post.images && post.images.length > 0) {
                const gridClass = post.images.length === 1 ? 'single' : post.images.length === 2 ? 'double' : post.images.length === 3 ? 'triple' : 'quad';
                if (post.images.length === 1) {
                    imagesHtml = `<img src="${post.images[0]}" class="post-single-image" alt="" onclick="openLightbox('${post.images[0]}')" loading="lazy">`;
                } else {
                    imagesHtml = `<div class="post-images ${gridClass}">${post.images.slice(0, 4).map((img, i) => `
                        <img src="${img}" alt="" onclick="openLightbox('${img}')" loading="lazy">
                    `).join('')}</div>`;
                }
            }

            const postEl = document.createElement('div');
            postEl.className = 'post-card';
            postEl.id = `post-${post.id}`;
            postEl.innerHTML = `
                <div class="post-header">
                    <div class="post-user" onclick="openProfile('${post.userId}', '${escapeHtml(post.userName)}', '${post.userPhoto}')">
                        <div class="avatar-wrap">
                            <img src="${post.userPhoto}" alt="${post.userName}" onerror="this.src='${DEFAULT_AVATAR}${post.userId}'">
                        </div>
                        <div class="post-user-info">
                            <h4>${escapeHtml(post.userName)}</h4>
                            <span>${timeAgo}</span>
                        </div>
                    </div>
                    <div style="position: relative;">
                        <button class="post-menu-btn" onclick="togglePostMenu('${post.id}')"><i class="fas fa-ellipsis-h"></i></button>
                        <div id="post-menu-${post.id}" class="post-menu-dropdown hidden">
                            ${isOwner ? `
                            <button class="post-menu-item" onclick="editPost('${post.id}')"><i class="fas fa-pen"></i> Edit</button>
                            <button class="post-menu-item danger" onclick="deletePost('${post.id}')"><i class="fas fa-trash"></i> Delete</button>
                            ` : ''}
                            <button class="post-menu-item" onclick="toggleSavePost('${post.id}')">
                                <i class="${isSaved ? 'fas' : 'far'} fa-bookmark" style="color: ${isSaved ? 'var(--warning)' : ''}"></i> 
                                ${isSaved ? 'Unsave' : 'Save'} Post
                            </button>
                        </div>
                    </div>
                </div>
                <div class="post-content">${escapeHtml(post.text)}</div>
                ${imagesHtml}
                <div class="post-stats">
                    <div class="post-stats-left">
                        ${reactionBadges ? `<div class="reaction-badges">${reactionBadges}</div><span>${totalReactions}</span>` : '<span style="font-style: italic;">Be the first to react</span>'}
                    </div>
                    <div style="display: flex; gap: 14px; font-weight: 600;">
                        <span style="cursor: pointer; transition: color 0.2s;" onclick="openCommentsModal('${post.id}')">${commentsCount} comment${commentsCount !== 1 ? 's' : ''}</span>
                        <span>${post.shares || 0} share${(post.shares || 0) !== 1 ? 's' : ''}</span>
                    </div>
                </div>
                <div class="post-actions">
                    <button class="post-action-btn ${userReaction ? 'active' : ''}" id="react-btn-${post.id}" onclick="showReactionPicker('${post.id}')">
                        <i class="${userReaction ? 'fas' : 'far'} fa-heart" style="color: ${userReaction ? 'var(--pink-primary)' : ''}; transition: all 0.3s;"></i>
                        <span id="react-text-${post.id}">${userReaction ? REACTION_TYPES[userReaction] : 'Like'}</span>
                        <div class="reaction-picker hidden" id="picker-${post.id}">
                            ${REACTION_KEYS.map(k => `<button class="reaction-option ${userReaction === k ? 'selected' : ''}" onclick="reactToPost('${post.id}', '${k}', event)">${REACTION_TYPES[k]}</button>`).join('')}
                        </div>
                    </button>
                    <button class="post-action-btn" onclick="openCommentsModal('${post.id}')">
                        <i class="far fa-comment"></i>
                        <span>Comment</span>
                    </button>
                    <button class="post-action-btn ${isSaved ? 'saved' : ''}" id="save-btn-${post.id}" onclick="toggleSavePost('${post.id}')">
                        <i class="${isSaved ? 'fas' : 'far'} fa-bookmark"></i>
                        <span>${isSaved ? 'Saved' : 'Save'}</span>
                    </button>
                    <button class="post-action-btn" onclick="sharePost('${post.id}')">
                        <i class="far fa-paper-plane"></i>
                        <span>Share</span>
                    </button>
                </div>
            `;
            container.appendChild(postEl);

            onSnapshot(query(collection(db, "reactions"), where("postId", "==", post.id)), (snap) => {
                const counts = {};
                let myReact = null;
                snap.forEach(d => {
                    const r = d.data();
                    counts[r.type] = (counts[r.type] || 0) + 1;
                    if (r.userId === currentUser.uid) myReact = r.type;
                });
                updatePostReactionsUI(post.id, counts, myReact);
            });
        }

        function updatePostReactionsUI(postId, counts, myReact) {
            const total = Object.values(counts).reduce((a, b) => a + b, 0);
            const badges = Object.entries(counts)
                .filter(([_, c]) => c > 0)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3)
                .map(([type]) => `<span class="reaction-badge">${REACTION_TYPES[type]}</span>`).join('');

            const postEl = document.getElementById(`post-${postId}`);
            if (!postEl) return;
            const statsLeft = postEl.querySelector('.post-stats-left');
            if (statsLeft) {
                statsLeft.innerHTML = badges ? `<div class="reaction-badges">${badges}</div><span>${total}</span>` : '<span style="font-style: italic;">Be the first to react</span>';
            }

            const btn = document.getElementById(`react-btn-${postId}`);
            const text = document.getElementById(`react-text-${postId}`);
            const icon = btn?.querySelector('i');
            if (btn && text && icon) {
                if (myReact) {
                    btn.classList.add('active');
                    text.innerText = REACTION_TYPES[myReact];
                    icon.className = 'fas fa-heart reaction-bounce';
                    icon.style.color = 'var(--pink-primary)';
                    setTimeout(() => icon.classList.remove('reaction-bounce'), 500);
                } else {
                    btn.classList.remove('active');
                    text.innerText = 'Like';
                    icon.className = 'far fa-heart';
                    icon.style.color = '';
                }
            }

            const picker = document.getElementById(`picker-${postId}`);
            if (picker) {
                picker.querySelectorAll('.reaction-option').forEach(opt => {
                    opt.classList.toggle('selected', myReact && opt.innerText === REACTION_TYPES[myReact]);
                });
            }
        }

        // ===== REACTIONS =====
        window.showReactionPicker = function(postId) {
            const picker = document.getElementById(`picker-${postId}`);
            if (!picker) return;
            const isHidden = picker.classList.contains('hidden');
            document.querySelectorAll('.reaction-picker').forEach(p => p.classList.add('hidden'));
            if (isHidden) {
                picker.classList.remove('hidden');
                setTimeout(() => {
                    const closePicker = (e) => {
                        if (!picker.contains(e.target)) {
                            picker.classList.add('hidden');
                            document.removeEventListener('click', closePicker);
                        }
                    };
                    document.addEventListener('click', closePicker);
                }, 10);
            }
        };

        window.reactToPost = async function(postId, type, event) {
            event.stopPropagation();
            const picker = document.getElementById(`picker-${postId}`);
            if (picker) picker.classList.add('hidden');

            const btn = event.target;
            btn.classList.add('reaction-bounce');
            setTimeout(() => btn.classList.remove('reaction-bounce'), 500);

            const reactionId = `${currentUser.uid}_${postId}`;
            const ref = doc(db, "reactions", reactionId);
            const snap = await getDoc(ref);

            if (snap.exists()) {
                const existing = snap.data();
                if (existing.type === type) {
                    await deleteDoc(ref);
                    await updateDoc(doc(db, "posts", postId), { reactionsCount: increment(-1) });
                } else {
                    await updateDoc(ref, { type: type, timestamp: Date.now() });
                }
            } else {
                await setDoc(ref, {
                    postId: postId,
                    userId: currentUser.uid,
                    userName: currentUserData?.fullName || currentUser?.displayName || 'User',
                    type: type,
                    timestamp: Date.now()
                });
                await updateDoc(doc(db, "posts", postId), { reactionsCount: increment(1) });
            }
        };

        // ===== SAVE POST =====
        window.toggleSavePost = function(postId) {
            const index = savedPosts.indexOf(postId);
            if (index > -1) {
                savedPosts.splice(index, 1);
                showToast('Post unsaved', 'info');
            } else {
                savedPosts.push(postId);
                showToast('Post saved!', 'success');
            }
            localStorage.setItem('mr_saved_posts', JSON.stringify(savedPosts));
            updateSaveButtonUI(postId);
            document.querySelectorAll('.post-menu-dropdown').forEach(m => m.classList.add('hidden'));
        };

        function updateSaveButtonUI(postId) {
            const isSaved = savedPosts.includes(postId);
            const btn = document.getElementById(`save-btn-${postId}`);
            if (btn) {
                btn.classList.toggle('saved', isSaved);
                btn.innerHTML = `<i class="${isSaved ? 'fas' : 'far'} fa-bookmark"></i><span>${isSaved ? 'Saved' : 'Save'}</span>`;
            }
            const menuItem = document.querySelector(`#post-menu-${postId} .fa-bookmark`)?.parentElement;
            if (menuItem) {
                menuItem.innerHTML = `<i class="${isSaved ? 'fas' : 'far'} fa-bookmark" style="color: ${isSaved ? 'var(--warning)' : ''}"></i> ${isSaved ? 'Unsave' : 'Save'} Post`;
            }
        }

        window.showSavedPosts = async function() {
            const modal = document.getElementById('saved-posts-modal');
            const list = document.getElementById('saved-posts-list');
            modal.classList.remove('hidden');

            if (savedPosts.length === 0) {
                list.innerHTML = `
                    <div style="text-align: center; padding: 50px 24px; color: var(--text-muted);">
                        <i class="fas fa-bookmark" style="font-size: 3rem; margin-bottom: 16px; opacity: 0.2;"></i>
                        <p style="font-size: 1rem; font-weight: 500;">No saved posts yet</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = '<div style="text-align: center; padding: 30px; color: var(--text-muted);"><i class="fas fa-spinner fa-spin"></i></div>';

            try {
                let html = '<div style="display: flex; flex-direction: column; gap: 16px;">';
                for (const postId of savedPosts) {
                    const postSnap = await getDoc(doc(db, "posts", postId));
                    if (!postSnap.exists()) continue;
                    const p = postSnap.data();
                    html += `
                        <div style="background: var(--bg-card); border-radius: 16px; padding: 14px; border: 1px solid var(--glass-border); cursor: pointer; transition: all 0.2s;" onclick="closeSavedPostsModal(); document.getElementById('post-${postId}')?.scrollIntoView({behavior:'smooth', block:'center'});">
                            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                                <img src="${p.userPhoto || `${DEFAULT_AVATAR}${p.userId}`}" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: var(--bg-card); display: block;" onerror="this.src='${DEFAULT_AVATAR}${p.userId}'">
                                <div style="font-weight: 700; font-size: 0.9rem;">${escapeHtml(p.userName)}</div>
                                <div style="margin-left: auto; font-size: 0.75rem; color: var(--text-muted);">${formatTimeAgo(p.timestamp)}</div>
                            </div>
                            <p style="font-size: 0.9rem; line-height: 1.4; margin-bottom: 8px;">${escapeHtml(p.text)}</p>
                            ${p.images && p.images.length > 0 ? `<img src="${p.images[0]}" style="width: 100%; border-radius: 10px; max-height: 200px; object-fit: cover;" loading="lazy">` : ''}
                        </div>
                    `;
                }
                html += '</div>';
                list.innerHTML = html;
            } catch (e) {
                list.innerHTML = '<div style="text-align: center; padding: 30px; color: var(--danger);">Failed to load saved posts</div>';
            }
        };

        window.closeSavedPostsModal = function() {
            document.getElementById('saved-posts-modal').classList.add('hidden');
        };

        // ===== COMMENTS =====
        window.openCommentsModal = async function(postId) {
            activePostId = postId;
            activeCommentParentId = null;
            document.getElementById('comments-modal').classList.remove('hidden');
            document.getElementById('comment-modal-input').value = '';
            document.getElementById('comment-modal-input').placeholder = 'Write a comment...';
            await loadComments(postId);
        };
        window.closeCommentsModal = function() {
            document.getElementById('comments-modal').classList.add('hidden');
            activePostId = null;
            activeCommentParentId = null;
            if (commentsUnsub) {
                commentsUnsub();
                commentsUnsub = null;
            }
        };

        async function loadComments(postId) {
            if (commentsUnsub) {
                commentsUnsub();
                commentsUnsub = null;
            }
            const container = document.getElementById('comments-list-modal');
            container.innerHTML = '<div style="text-align: center; padding: 24px; color: var(--text-muted);"><i class="fas fa-spinner fa-spin"></i></div>';

            try {
                const q = query(collection(db, "comments"), where("postId", "==", postId), limit(100));
                const snap = await getDocs(q);
                let docs = snap.docs.filter(d => d.data().parentId === null || d.data().parentId === undefined);
                docs = docs.sort((a, b) => (b.data().timestamp || 0) - (a.data().timestamp || 0)).slice(0, 50);

                if (docs.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-muted); font-weight: 500;"><i class="fas fa-comment-slash" style="font-size: 2rem; margin-bottom: 12px; opacity: 0.3; display: block;"></i>No comments yet. Be the first!</div>';
                } else {
                    let html = '';
                    for (const d of docs) {
                        html += await renderCommentItem(d.id, d.data());
                    }
                    container.innerHTML = html;
                }

                const listenerQ = query(collection(db, "comments"), where("postId", "==", postId), limit(100));
                commentsUnsub = onSnapshot(listenerQ, async (liveSnap) => {
                    let liveDocs = liveSnap.docs.filter(d => d.data().parentId === null || d.data().parentId === undefined);
                    liveDocs = liveDocs.sort((a, b) => (b.data().timestamp || 0) - (a.data().timestamp || 0)).slice(0, 50);
                    let liveHtml = '';
                    for (const d of liveDocs) {
                        liveHtml += await renderCommentItem(d.id, d.data());
                    }
                    container.innerHTML = liveHtml || '<div style="text-align: center; padding: 40px; color: var(--text-muted); font-weight: 500;"><i class="fas fa-comment-slash" style="font-size: 2rem; margin-bottom: 12px; opacity: 0.3; display: block;"></i>No comments yet. Be the first!</div>';
                });
            } catch (err) {
                console.error('[Comments] Error:', err);
                container.innerHTML = '<div style="text-align: center; padding: 30px; color: var(--text-muted);">Failed to load comments.</div>';
                showToast('Failed to load comments', 'error');
            }
        }

        async function renderCommentItem(commentId, c) {
            const timeAgo = formatTimeAgo(c.timestamp);
            const isOwner = c.userId === currentUser.uid;
            const userPhoto = c.userPhoto || `${DEFAULT_AVATAR}${c.userId}`;

            let repliesHtml = '';
            try {
                const repliesQ = query(collection(db, "comments"), where("parentId", "==", commentId), limit(50));
                const repliesSnap = await getDocs(repliesQ);
                const sortedReplies = repliesSnap.docs.sort((a, b) => (a.data().timestamp || 0) - (b.data().timestamp || 0));
                if (sortedReplies.length > 0) {
                    repliesHtml = '<div class="comment-replies">';
                    sortedReplies.forEach(rd => {
                        const r = rd.data();
                        const rPhoto = r.userPhoto || `${DEFAULT_AVATAR}${r.userId}`;
                        repliesHtml += `
                            <div class="comment-item" style="animation: fadeInUp 0.3s ease-out;">
                                <img src="${rPhoto}" alt="" onclick="openProfile('${r.userId}', '${escapeHtml(r.userName)}', '${rPhoto}')" onerror="this.src='${DEFAULT_AVATAR}${r.userId}'">
                                <div class="comment-body">
                                    <h5 onclick="openProfile('${r.userId}', '${escapeHtml(r.userName)}', '${rPhoto}')">${escapeHtml(r.userName)}</h5>
                                    <p>${escapeHtml(r.text)}</p>
                                </div>
                            </div>
                        `;
                    });
                    repliesHtml += '</div>';
                }
            } catch (err) {
                console.error('[Comments] Replies error:', err);
            }

            return `
                <div class="comment-item" id="comment-${commentId}">
                    <img src="${userPhoto}" alt="" onclick="openProfile('${c.userId}', '${escapeHtml(c.userName)}', '${userPhoto}')" onerror="this.src='${DEFAULT_AVATAR}${c.userId}'">
                    <div style="flex: 1;">
                        <div class="comment-body">
                            <h5 onclick="openProfile('${c.userId}', '${escapeHtml(c.userName)}', '${userPhoto}')">${escapeHtml(c.userName)}</h5>
                            <p>${escapeHtml(c.text)}</p>
                        </div>
                        <div class="comment-meta">
                            <span>${timeAgo}</span>
                            <span onclick="replyToComment('${commentId}', '${escapeHtml(c.userName)}')">Reply</span>
                            ${isOwner ? `<span onclick="deleteComment('${commentId}')" style="color: var(--danger);">Delete</span>` : ''}
                        </div>
                        ${repliesHtml}
                    </div>
                </div>
            `;
        }

        window.replyToComment = function(commentId, userName) {
            activeCommentParentId = commentId;
            const input = document.getElementById('comment-modal-input');
            input.placeholder = `Reply to ${userName}...`;
            input.focus();
        };

        window.submitComment = async function() {
            const input = document.getElementById('comment-modal-input');
            const text = input.value.trim();
            if (!text || !activePostId) return;

            try {
                await addDoc(collection(db, "comments"), {
                    postId: activePostId,
                    userId: currentUser.uid,
                    userName: currentUserData?.fullName || currentUser?.displayName || 'User',
                    userPhoto: currentUserData?.photoURL || currentUser?.photoURL || `${DEFAULT_AVATAR}${currentUser.uid}`,
                    text: text,
                    parentId: activeCommentParentId || null,
                    timestamp: Date.now()
                });
                await updateDoc(doc(db, "posts", activePostId), { commentsCount: increment(1) });
                input.value = '';
                activeCommentParentId = null;
                input.placeholder = 'Write a comment...';
                showToast('Comment posted!', 'success');
            } catch(e) {
                showToast('Failed to post comment', 'error');
            }
        };

        window.deleteComment = async function(commentId) {
            if (!confirm('Delete this comment?')) return;
            try {
                await deleteDoc(doc(db, "comments", commentId));
                const repliesQ = query(collection(db, "comments"), where("parentId", "==", commentId));
                const repliesSnap = await getDocs(repliesQ);
                const batch = writeBatch(db);
                repliesSnap.forEach(d => batch.delete(d.ref));
                await batch.commit();
                if (activePostId) {
                    await updateDoc(doc(db, "posts", activePostId), { commentsCount: increment(-(1 + repliesSnap.size)) });
                }
                showToast('Comment deleted', 'success');
            } catch(e) {
                showToast('Failed to delete', 'error');
            }
        };

        // ===== CREATE POST =====
        window.openCreatePostModal = function() {
            document.getElementById('create-post-modal').classList.remove('hidden');
            document.getElementById('post-textarea').value = '';
            selectedPostImages = [];
            updateImagePreview();
        };
        window.closeCreatePostModal = function() {
            document.getElementById('create-post-modal').classList.add('hidden');
        };

        document.getElementById('open-create-post').addEventListener('click', openCreatePostModal);

        document.getElementById('post-image-input').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                if (selectedPostImages.length >= 4) break;
                const compressed = await compressImage(file, 1200, 0.8);
                selectedPostImages.push(compressed);
            }
            updateImagePreview();
            e.target.value = '';
        });

        function updateImagePreview() {
            const grid = document.getElementById('image-preview-grid');
            if (selectedPostImages.length === 0) {
                grid.classList.add('hidden');
                return;
            }
            grid.classList.remove('hidden');
            grid.innerHTML = selectedPostImages.map((img, i) => `
                <div class="image-preview-item">
                    <img src="${img}" alt="">
                    <button class="image-preview-remove" onclick="removePostImage(${i})"><i class="fas fa-times"></i></button>
                </div>
            `).join('');
        }
        window.removePostImage = function(index) {
            selectedPostImages.splice(index, 1);
            updateImagePreview();
        };

        window.submitPost = async function() {
            const text = document.getElementById('post-textarea').value.trim();
            if (!text && selectedPostImages.length === 0) {
                showToast('Please add text or an image', 'error');
                return;
            }
            const btn = document.getElementById('submit-post-btn');
            btn.disabled = true;
            btn.innerText = 'Posting...';

            try {
                await addDoc(collection(db, "posts"), {
                    userId: currentUser.uid,
                    userName: currentUserData?.fullName || currentUser?.displayName || 'User',
                    userPhoto: currentUserData?.photoURL || currentUser?.photoURL || `${DEFAULT_AVATAR}${currentUser.uid}`,
                    text: text,
                    images: selectedPostImages,
                    timestamp: Date.now(),
                    reactionsCount: 0,
                    commentsCount: 0,
                    shares: 0
                });
                showToast('Post published!', 'success');
                closeCreatePostModal();
                selectedPostImages = [];
                oldestPostTimestamp = null;
                hasMorePosts = true;
                document.getElementById('feed-container').innerHTML = '';
                loadPosts();
            } catch(e) {
                showToast('Failed to publish post', 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Post';
            }
        };

        // ===== POST ACTIONS =====
        window.togglePostMenu = function(postId) {
            const menu = document.getElementById(`post-menu-${postId}`);
            if (!menu) return;
            const isHidden = menu.classList.contains('hidden');
            document.querySelectorAll('.post-menu-dropdown').forEach(m => m.classList.add('hidden'));
            if (isHidden) {
                menu.classList.remove('hidden');
                setTimeout(() => {
                    const closeMenu = (e) => {
                        if (!menu.contains(e.target)) {
                            menu.classList.add('hidden');
                            document.removeEventListener('click', closeMenu);
                        }
                    };
                    document.addEventListener('click', closeMenu);
                }, 10);
            }
        };

        window.editPost = async function(postId) {
            const postSnap = await getDoc(doc(db, "posts", postId));
            if (!postSnap.exists()) return;
            const post = postSnap.data();
            const newText = prompt('Edit your post:', post.text);
            if (newText === null) return;
            if (!newText.trim() && (!post.images || post.images.length === 0)) {
                showToast('Post cannot be empty', 'error');
                return;
            }
            try {
                await updateDoc(doc(db, "posts", postId), { text: newText.trim() });
                showToast('Post updated', 'success');
                document.querySelectorAll('.post-menu-dropdown').forEach(m => m.classList.add('hidden'));
            } catch(e) {
                showToast('Failed to update', 'error');
            }
        };

        window.deletePost = async function(postId) {
            if (!confirm('Delete this post permanently?')) return;
            try {
                const reactSnap = await getDocs(query(collection(db, "reactions"), where("postId", "==", postId)));
                const batch = writeBatch(db);
                reactSnap.forEach(d => batch.delete(d.ref));
                const commentSnap = await getDocs(query(collection(db, "comments"), where("postId", "==", postId)));
                commentSnap.forEach(d => batch.delete(d.ref));
                batch.delete(doc(db, "posts", postId));
                await batch.commit();
                const idx = savedPosts.indexOf(postId);
                if (idx > -1) {
                    savedPosts.splice(idx, 1);
                    localStorage.setItem('mr_saved_posts', JSON.stringify(savedPosts));
                }
                showToast('Post deleted', 'success');
                const el = document.getElementById(`post-${postId}`);
                if (el) {
                    el.style.transform = 'translateX(100%)';
                    el.style.opacity = '0';
                    setTimeout(() => el.remove(), 300);
                }
            } catch(e) {
                showToast('Failed to delete', 'error');
            }
        };

        window.sharePost = async function(postId) {
            try {
                await updateDoc(doc(db, "posts", postId), { shares: increment(1) });
                showToast('Post shared!', 'success');
            } catch(e) {
                showToast('Shared!', 'success');
            }
        };

        // ===== PROFILE (FIXED - works even if user doc missing) =====
        window.openProfile = async function(targetUid, fallbackName, fallbackPhoto) {
            try {
                const uid = targetUid || currentUser?.uid;
                if (!uid) {
                    showToast('User ID not available', 'error');
                    return;
                }

                let u = null;
                let userExists = false;

                const snap = await getDoc(doc(db, "users", uid));
                if (snap.exists()) {
                    u = snap.data();
                    userExists = true;
                }

                if (!userExists) {
                    const postsQ = query(collection(db, "posts"), where("userId", "==", uid), limit(1));
                    const postsSnap = await getDocs(postsQ);
                    if (!postsSnap.empty) {
                        const post = postsSnap.docs[0].data();
                        u = {
                            fullName: post.userName || fallbackName || 'User',
                            photoURL: post.userPhoto || fallbackPhoto,
                            bio: 'No bio yet.',
                            level: 1,
                            gold: 0,
                            userType: 'Bronze'
                        };
                    } else {
                        u = {
                            fullName: fallbackName || 'Unknown User',
                            photoURL: fallbackPhoto || `${DEFAULT_AVATAR}${uid}`,
                            bio: 'No bio yet.',
                            level: 1,
                            gold: 0,
                            userType: 'Bronze'
                        };
                    }
                }

                document.getElementById('profile-avatar').src = u.photoURL || `${DEFAULT_AVATAR}${uid}`;
                document.getElementById('profile-name').innerText = u.fullName || u.username || 'User';
                document.getElementById('profile-bio').innerText = u.bio || 'No bio yet.';
                document.getElementById('profile-level').innerText = u.level || 1;
                document.getElementById('profile-gold').innerText = (u.gold || 0).toLocaleString();

                const badgeMap = {
                    'Bronze': { color: '#CD7F32' },
                    'Silver': { color: '#C0C0C0' },
                    'Gold': { color: '#FFD700' }
                };
                const badge = badgeMap[u.userType || 'Bronze'];
                const badgesContainer = document.getElementById('profile-badges');
                badgesContainer.innerHTML = `
                    <span style="font-size: 0.75rem; padding: 4px 12px; border-radius: 14px; background: ${badge.color}22; color: ${badge.color}; border: 1.5px solid ${badge.color}44; font-weight: 700;">${u.userType || 'Bronze'}</span>
                    <span style="font-size: 0.75rem; padding: 4px 12px; border-radius: 14px; background: rgba(139,92,246,0.1); color: var(--purple-accent); border: 1.5px solid var(--glass-border); font-weight: 700;">Lv.${u.level || 1}</span>
                `;

                try {
                    const postsQ = query(collection(db, "posts"), where("userId", "==", uid), limit(50));
                    const snap = await getDocs(postsQ);
                    const sortedDocs = snap.docs.sort((a, b) => (b.data().timestamp || 0) - (a.data().timestamp || 0)).slice(0, 10);
                    const postsList = document.getElementById('profile-posts-list');
                    document.getElementById('profile-posts-count').innerText = sortedDocs.length;

                    if (sortedDocs.length === 0) {
                        postsList.innerHTML = '<div class="profile-empty-posts"><i class="fas fa-newspaper" style="font-size: 2.5rem; margin-bottom: 12px; opacity: 0.2;"></i><p>No posts yet</p></div>';
                    } else {
                        let html = '<div style="display: flex; flex-direction: column; gap: 14px;">';
                        sortedDocs.forEach(d => {
                            const p = d.data();
                            html += `
                                <div style="background: var(--bg-card); border-radius: 14px; padding: 14px; border: 1px solid var(--glass-border); transition: all 0.2s;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                                    <p style="font-size: 0.9rem; margin-bottom: 10px; line-height: 1.5;">${escapeHtml(p.text)}</p>
                                    ${p.images && p.images.length > 0 ? `<img src="${p.images[0]}" style="width: 100%; border-radius: 10px; max-height: 220px; object-fit: cover;" loading="lazy">` : ''}
                                    <div style="margin-top: 10px; font-size: 0.8rem; color: var(--text-muted); font-weight: 500;">${formatTimeAgo(p.timestamp)}</div>
                                </div>
                            `;
                        });
                        html += '</div>';
                        postsList.innerHTML = html;
                    }
                } catch (postsErr) {
                    console.error('[Profile] Posts error:', postsErr);
                    document.getElementById('profile-posts-list').innerHTML = '<div class="profile-empty-posts"><i class="fas fa-exclamation-circle" style="color: var(--danger); font-size: 1.5rem; margin-bottom: 8px;"></i><p>Could not load posts</p></div>';
                }

                document.getElementById('profile-modal').classList.remove('hidden');
            } catch (err) {
                console.error('[Profile] Fatal:', err);
                showToast('Failed to load profile', 'error');
            }
        };
        window.closeProfileModal = function() {
            document.getElementById('profile-modal').classList.add('hidden');
        };

        // ===== LIGHTBOX =====
        window.openLightbox = function(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').classList.remove('hidden');
        };
        window.closeLightbox = function() {
            document.getElementById('lightbox').classList.add('hidden');
        };

        // ===== UTILITIES =====
        async function compressImage(file, maxWidth, quality) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width;
                        let h = img.height;
                        if (w > maxWidth) {
                            h = (h * maxWidth) / w;
                            w = maxWidth;
                        }
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function formatTimeAgo(timestamp) {
            if (!timestamp) return 'Just now';
            const now = Date.now();
            const diff = now - timestamp;
            const seconds = Math.floor(diff / 1000);
            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            if (days < 7) return `${days}d ago`;
            return new Date(timestamp).toLocaleDateString();
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { info: 'fa-info-circle', success: 'fa-check-circle', error: 'fa-circle-xmark' };
            toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(10px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function setupInfiniteScroll() {
            const sentinel = document.createElement('div');
            sentinel.id = 'scroll-sentinel';
            sentinel.style.height = '1px';
            document.getElementById('feed-container').appendChild(sentinel);
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !isLoadingMore && hasMorePosts) {
                    loadPosts();
                }
            }, { rootMargin: '200px' });
            observer.observe(sentinel);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeCreatePostModal();
                closeCreateStoryModal();
                closeStoryViewer();
                closeCommentsModal();
                closeProfileModal();
                closeLightbox();
                closeSavedPostsModal();
                document.querySelectorAll('.post-menu-dropdown').forEach(m => m.classList.add('hidden'));
                document.querySelectorAll('.reaction-picker').forEach(p => p.classList.add('hidden'));
            }
        });

        window.addEventListener('beforeunload', () => {
            if (postsUnsub) postsUnsub();
            if (storiesUnsub) storiesUnsub();
            if (commentsUnsub) commentsUnsub();
        });
    </script>
