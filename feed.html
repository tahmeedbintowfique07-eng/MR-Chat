<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MR - Social Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0B0C10;
            --bg-sidebar: #12131C;
            --bg-card: #1F2029;
            --bg-hover: #252736;
            --bg-input: #1A1B26;
            --pink-primary: #FF007F;
            --pink-hover: #E0006C;
            --pink-light: #FF66B2;
            --purple-accent: #8B5CF6;
            --purple-glow: #A78BFA;
            --text-main: #FFFFFF;
            --text-muted: #8F92A1;
            --text-secondary: #6B7280;
            --glass-border: rgba(255, 0, 127, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --success: #34C759;
            --danger: #FF3B30;
            --warning: #FFD700;
            --info: #00E6FF;
            --radius: 20px;
            --radius-sm: 14px;
            --radius-xs: 10px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 30px rgba(255, 0, 127, 0.2);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-main: #F8F9FB;
            --bg-sidebar: #FFFFFF;
            --bg-card: #FFFFFF;
            --bg-hover: #F3F4F6;
            --bg-input: #F3F4F6;
            --text-main: #111827;
            --text-muted: #6B7280;
            --text-secondary: #9CA3AF;
            --glass-border: rgba(139, 92, 246, 0.2);
            --glass-bg: rgba(255, 255, 255, 0.6);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.08);
            --shadow-glow: 0 0 30px rgba(139, 92, 246, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 100px;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .hidden { display: none !important; }

        /* ===== HEADER ===== */
        .feed-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--glass-border);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(20px);
            transition: var(--transition);
        }
        .feed-header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .icon-btn:hover {
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-accent));
            border-color: transparent;
            transform: scale(1.08);
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
        }
        .icon-btn:active { transform: scale(0.95); }
        .icon-btn.saved-active {
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.3);
            color: var(--warning);
        }
        .icon-btn.saved-active:hover {
            background: var(--warning);
            color: var(--bg-main);
        }

        /* FIXED: Header avatar - reliable gradient border without mask */
        .header-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2.5px solid transparent;
            background: linear-gradient(var(--bg-sidebar), var(--bg-sidebar)) padding-box,
                        linear-gradient(135deg, var(--pink-primary), var(--purple-accent)) border-box;
            cursor: pointer;
            transition: transform 0.2s;
            flex-shrink: 0;
            display: block;
        }
        .header-avatar:hover { transform: scale(1.05); }

        /* ===== STORIES ===== */
        .stories-container {
            padding: 18px 14px;
            border-bottom: 1px solid var(--glass-border);
            background: var(--bg-sidebar);
            transition: var(--transition);
        }
        .stories-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }
        .stories-scroll::-webkit-scrollbar { display: none; }
        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            flex-shrink: 0;
            min-width: 76px;
            transition: transform 0.2s;
        }
        .story-item:active { transform: scale(0.92); }
        .story-ring {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            padding: 3.5px;
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-accent), var(--pink-light));
            position: relative;
            transition: transform 0.3s;
        }
        .story-ring:hover { transform: scale(1.05); }
        .story-ring.seen { background: var(--bg-hover); }
        .story-ring.own {
            background: linear-gradient(135deg, var(--info), var(--pink-primary));
        }
        .story-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2.5px solid var(--bg-sidebar);
            background: var(--bg-sidebar);
            display: block;
        }
        .story-add-btn {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-accent));
            border: 2.5px solid var(--bg-sidebar);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            box-shadow: 0 2px 8px rgba(255, 0, 127, 0.3);
        }
        .story-name {
            font-size: 0.72rem;
            color: var(--text-muted);
            max-width: 76px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: center;
            font-weight: 500;
        }
        .story-time {
            font-size: 0.6rem;
            color: var(--text-secondary);
            margin-top: -4px;
        }

        /* ===== CREATE POST BAR ===== */
        .create-post-bar {
            padding: 16px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
        }
        .create-post-input {
            flex: 1;
            padding: 14px 20px;
            background: var(--bg-input);
            border: 1.5px solid var(--glass-border);
            border-radius: 28px;
            color: var(--text-muted);
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }
        .create-post-input:hover {
            border-color: var(--purple-accent);
            color: var(--text-main);
            box-shadow: 0 2px 12px rgba(139, 92, 246, 0.1);
        }

        /* ===== FEED ===== */
        .feed-container {
            max-width: 680px;
            margin: 0 auto;
            padding: 16px 16px 120px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ===== POST CARD ===== */
        .post-card {
            background: var(--bg-sidebar);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            overflow: hidden;
            animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .post-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .post-header {
            padding: 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .post-user {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .post-user:hover { opacity: 0.8; }
        
        /* FIXED: Post avatar with solid background fallback */
        .post-user .avatar-wrap {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            padding: 2.5px;
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-accent));
            flex-shrink: 0;
        }
        .post-user .avatar-wrap img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--bg-sidebar);
            background: var(--bg-card);
            display: block;
        }
        
        .post-user-info h4 {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: -0.2px;
        }
        .post-user-info span {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .post-menu-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            font-size: 1.1rem;
        }
        .post-menu-btn:hover {
            background: var(--bg-hover);
            color: var(--text-main);
            transform: rotate(90deg);
        }
        .post-content {
            padding: 0 18px 14px;
            font-size: 0.97rem;
            line-height: 1.6;
            word-break: break-word;
            font-weight: 400;
            color: var(--text-main);
        }
        .post-images {
            display: grid;
            gap: 3px;
            margin-bottom: 14px;
            padding: 0 2px;
        }
        .post-images.single { grid-template-columns: 1fr; }
        .post-images.double { grid-template-columns: 1fr 1fr; }
        .post-images.triple {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 220px 220px;
        }
        .post-images.triple img:first-child { grid-row: span 2; }
        .post-images.quad {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 220px 220px;
        }
        .post-images img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg-card);
            display: block;
        }
        .post-images img:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        .post-single-image {
            width: 100%;
            max-height: 520px;
            object-fit: cover;
            cursor: pointer;
            background: var(--bg-card);
            transition: opacity 0.3s;
            display: block;
        }
        .post-single-image:hover { opacity: 0.95; }

        /* ===== REACTIONS BAR ===== */
        .post-stats {
            padding: 10px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.82rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255,255,255,0.04);
            font-weight: 500;
        }
        [data-theme="light"] .post-stats {
            border-top-color: rgba(0,0,0,0.04);
        }
        .post-stats-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .reaction-badges {
            display: flex;
            align-items: center;
        }
        .reaction-badge {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1.5px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            margin-left: -5px;
            transition: transform 0.2s;
        }
        .reaction-badge:first-child { margin-left: 0; }
        .reaction-badge:hover { transform: scale(1.2); }
        .post-actions {
            display: flex;
            justify-content: space-around;
            padding: 8px 14px 12px;
            border-top: 1px solid rgba(255,255,255,0.04);
            gap: 4px;
        }
        [data-theme="light"] .post-actions {
            border-top-color: rgba(0,0,0,0.04);
        }
        .post-action-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: var(--transition);
            position: relative;
        }
        .post-action-btn:hover {
            background: var(--bg-hover);
            color: var(--text-main);
            transform: translateY(-1px);
        }
        .post-action-btn:active { transform: scale(0.95); }
        .post-action-btn.active { color: var(--pink-primary); }
        .post-action-btn.active i { color: var(--pink-primary); }
        .post-action-btn.saved { color: var(--warning); }
        .post-action-btn.saved i { color: var(--warning); }

        /* ===== REACTION PICKER ===== */
        .reaction-picker {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 8px 12px;
            display: flex;
            gap: 6px;
            box-shadow: var(--shadow-md), 0 0 40px rgba(0,0,0,0.2);
            z-index: 50;
            animation: popUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
        }
        @keyframes popUp {
            from { opacity: 0; transform: translateX(-50%) translateY(0) scale(0.7); }
            to { opacity: 1; transform: translateX(-50%) translateY(-10px) scale(1); }
        }
        .reaction-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: transparent;
            border: none;
            position: relative;
        }
        .reaction-option:hover {
            transform: scale(1.35) translateY(-8px);
            background: rgba(255,255,255,0.05);
            z-index: 10;
        }
        .reaction-option:active { transform: scale(1.1); }
        .reaction-option.selected {
            background: rgba(255, 0, 127, 0.12);
            border: 1.5px solid var(--pink-primary);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.2);
        }
        @keyframes reactionBounce {
            0% { transform: scale(1); }
            40% { transform: scale(1.4); }
            60% { transform: scale(0.9); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .reaction-bounce {
            animation: reactionBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ===== COMMENTS SECTION ===== */
        .comments-section {
            padding: 0 18px 18px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        [data-theme="light"] .comments-section {
            border-top-color: rgba(0,0,0,0.04);
        }
        .comment-input-area {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 14px 0;
        }
        .comment-input-area img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--pink-primary);
            flex-shrink: 0;
            background: var(--bg-card);
            display: block;
        }
        .comment-input-wrapper {
            flex: 1;
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--bg-input);
            border: 1.5px solid var(--glass-border);
            border-radius: 24px;
            padding: 10px 16px;
            transition: var(--transition);
        }
        .comment-input-wrapper:focus-within {
            border-color: var(--purple-accent);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }
        .comment-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
            font-weight: 500;
        }
        .comment-input-wrapper input::placeholder { color: var(--text-muted); }
        .comment-send-btn {
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-accent));
            border: none;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(255, 0, 127, 0.3);
        }
        .comment-send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
        }
        .comment-send-btn:active { transform: scale(0.9); }
        .comment-send-btn:disabled {
            background: var(--bg-hover);
            color: var(--text-muted);
            cursor: default;
            box-shadow: none;
            transform: none;
        }
        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .comment-item {
            display: flex;
            gap: 12px;
            animation: fadeInUp 0.3s ease-out;
        }
        .comment-item img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--pink-primary);
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.2s;
            background: var(--bg-card);
            display: block;
        }
        .comment-item img:hover { transform: scale(1.1); }
        .comment-body {
            background: var(--bg-input);
            border-radius: 16px;
            padding: 12px 16px;
            flex: 1;
            transition: var(--transition);
        }
        .comment-body:hover { background: var(--bg-hover); }
        .comment-body h5 {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 4px;
            cursor: pointer;
            color: var(--text-main);
            transition: color 0.2s;
        }
        .comment-body h5:hover { color: var(--pink-primary); }
        .comment-body p {
            font-size: 0.88rem;
            line-height: 1.5;
            word-break: break-word;
            color: var(--text-main);
        }
        .comment-meta {
            display: flex;
            gap: 16px;
            margin-top: 6px;
            padding-left: 48px;
            font-size: 0.78rem;
            color: var(--text-muted);
            font-weight: 600;
        }
        .comment-meta span {
            cursor: pointer;
            transition: var(--transition);
        }
        .comment-meta span:hover { color: var(--pink-primary); }
        .comment-replies {
            margin-left: 48px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-left: 2.5px solid var(--glass-border);
            padding-left: 14px;
        }
        .view-more-comments {
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px 0;
            font-weight: 600;
            transition: color 0.2s;
        }
        .view-more-comments:hover { color: var(--pink-primary); }

        /* ===== MODALS ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            z-index: 10000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 0;
            animation: fadeIn 0.25s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-overlay.centered {
            align-items: center;
            padding: 20px;
        }
        .modal-card {
            background: var(--bg-sidebar);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius) var(--radius) 0 0;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-md);
        }
        .modal-overlay.centered .modal-card {
            border-radius: var(--radius);
            animation: scaleIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0.8; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-header {
            padding: 20px 22px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-header h3 {
            font-size: 1.15rem;
            font-weight: 700;
        }
        .modal-close {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--bg-hover);
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .modal-close:hover {
            background: var(--danger);
            color: white;
            transform: rotate(90deg);
        }

        /* ===== CREATE POST MODAL ===== */
        .create-post-textarea {
            width: 100%;
            min-height: 140px;
            background: var(--bg-input);
            border: 1.5px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 16px;
            color: var(--text-main);
            font-size: 1.05rem;
            resize: vertical;
            outline: none;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            font-weight: 400;
            line-height: 1.5;
        }
        .create-post-textarea:focus {
            border-color: var(--purple-accent);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }
        .create-post-textarea::placeholder { color: var(--text-muted); }
        .image-preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 14px;
        }
        .image-preview-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            border: 1.5px solid var(--glass-border);
            transition: transform 0.2s;
        }
        .image-preview-item:hover { transform: scale(1.02); }
        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .image-preview-remove {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            backdrop-filter: blur(4px);
        }
        .image-preview-remove:hover {
            background: var(--danger);
            transform: scale(1.1);
        }
        .modal-footer-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0 0;
            border-top: 1px solid var(--glass-border);
            margin-top: 14px;
        }
        .modal-media-btns {
            display: flex;
            gap: 10px;
        }
        .modal-media-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-input);
            border: 1.5px solid var(--glass-border);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: var(--transition);
        }
        .modal-media-btn:hover {
            color: var(--purple-accent);
            border-color: var(--purple-accent);
            transform: scale(1.1);
            background: rgba(139, 92, 246, 0.1);
        }
        .btn-primary {
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-accent));
            border: none;
            border-radius: 28px;
            color: white;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.4);
        }
        .btn-primary:active {
            transform: translateY(0) scale(0.98);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: default;
            transform: none;
            box-shadow: none;
        }

        /* ===== STORY VIEWER - FIXED ===== */
        .story-viewer-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 20000;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.2s ease-out;
        }
        .story-progress-bar {
            display: flex;
            gap: 4px;
            padding: 14px 16px 10px;
        }
        .story-progress-segment {
            flex: 1;
            height: 3px;
            background: rgba(255,255,255,0.25);
            border-radius: 2px;
            overflow: hidden;
        }
        .story-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--pink-primary), var(--purple-accent));
            width: 0%;
            transition: width 0.1s linear;
        }
        .story-viewer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
        }
        .story-viewer-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .story-viewer-user img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2.5px solid var(--pink-primary);
            display: block;
        }
        .story-viewer-user span {
            font-weight: 700;
            font-size: 0.95rem;
            color: white;
        }
        .story-viewer-time {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
            margin-left: 52px;
            margin-top: -8px;
            margin-bottom: 8px;
        }
        .story-viewer-close {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }
        .story-viewer-close:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }
        
        /* FIXED: Story image container */
        .story-viewer-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 16px;
        }
        .story-viewer-content img {
            max-width: 100%;
            max-height: 75vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 8px;
            display: block;
            background: #111;
        }
        .story-viewer-caption {
            position: absolute;
            bottom: 90px;
            left: 16px;
            right: 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 1rem;
            text-align: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .story-viewer-nav {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 35%;
            cursor: pointer;
            z-index: 10;
        }
        .story-viewer-nav.left { left: 0; }
        .story-viewer-nav.right { right: 0; }
        .story-viewer-footer {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .story-viewer-footer input {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 24px;
            padding: 12px 18px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            backdrop-filter: blur(10px);
        }
        .story-viewer-footer input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .story-delete-btn {
            position: absolute;
            top: 60px;
            right: 16px;
            background: rgba(255,59,48,0.8);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            z-index: 20;
            backdrop-filter: blur(10px);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .story-delete-btn:hover {
            background: var(--danger);
            transform: scale(1.05);
        }

        /* ===== PROFILE MODAL ===== */
        .profile-banner {
            height: 160px;
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-accent), #FF0055);
            position: relative;
            animation: gradientShift 8s ease infinite;
            background-size: 200% 200%;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg-sidebar);
            margin: -50px auto 0;
            display: block;
            position: relative;
            z-index: 2;
            background: var(--bg-card);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .profile-info-center {
            text-align: center;
            padding: 14px 24px 24px;
        }
        .profile-info-center h2 {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }
        .profile-info-center p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .profile-stats-row {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 20px;
        }
        .profile-stat {
            text-align: center;
            transition: transform 0.2s;
        }
        .profile-stat:hover { transform: translateY(-2px); }
        .profile-stat .num {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .profile-stat .label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }
        .profile-posts-tab {
            padding: 0 24px 24px;
        }
        .profile-posts-tab h4 {
            font-size: 0.95rem;
            margin-bottom: 14px;
            color: var(--text-muted);
            font-weight: 700;
        }
        .profile-empty-posts {
            text-align: center;
            padding: 50px 24px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* ===== LIGHTBOX ===== */
        .lightbox-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.96);
            z-index: 25000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease-out;
        }
        .lightbox-overlay img {
            max-width: 95vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 12px;
            animation: scaleIn 0.3s ease-out;
            display: block;
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }
        .lightbox-close:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: var(--bg-sidebar);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--pink-primary);
            color: var(--text-main);
            padding: 14px 22px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: var(--shadow-md);
            animation: toastSlide 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
        }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.info { border-left-color: var(--info); }
        @keyframes toastSlide {
            from { transform: translateX(-50%) translateY(20px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* ===== LOADING ===== */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 50000;
            transition: opacity 0.4s;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--pink-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-hover) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-sm);
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .post-skeleton {
            height: 320px;
            margin-bottom: 20px;
            border-radius: var(--radius);
        }

        /* ===== POST MENU DROPDOWN ===== */
        .post-menu-dropdown {
            position: absolute;
            right: 18px;
            top: 52px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            z-index: 60;
            min-width: 180px;
            overflow: hidden;
            animation: dropFade 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes dropFade {
            from { opacity: 0; transform: translateY(-8px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .post-menu-item {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-weight: 500;
        }
        .post-menu-item:hover {
            background: rgba(139, 92, 246, 0.08);
        }
        .post-menu-item.danger { color: var(--danger); }
        .post-menu-item.danger:hover {
            background: rgba(255, 59, 48, 0.08);
        }

        /* ===== INFINITE SCROLL LOADER ===== */
        .feed-loader {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .feed-loader i {
            animation: spin 1s linear infinite;
            margin-right: 10px;
            color: var(--pink-primary);
        }
        .feed-end {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* ===== FLOATING BOTTOM NAV ===== */
        .bottom-nav-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 90;
            width: 92%;
            max-width: 400px;
            pointer-events: none;
        }
        .bottom-nav {
            background: var(--bg-sidebar);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            box-shadow: var(--shadow-md), 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
            pointer-events: auto;
            position: relative;
            transition: var(--transition);
        }
        [data-theme="light"] .bottom-nav {
            box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.05);
        }
        .bottom-nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.6rem;
            cursor: pointer;
            padding: 8px 14px;
            transition: var(--transition);
            border-radius: 20px;
            position: relative;
            font-weight: 600;
        }
        .bottom-nav-btn i {
            font-size: 1.25rem;
            transition: var(--transition);
        }
        .bottom-nav-btn.active {
            color: var(--pink-primary);
            background: rgba(255, 0, 127, 0.08);
        }
        .bottom-nav-btn.active i {
            transform: translateY(-2px);
        }
        .bottom-nav-btn:hover { color: var(--text-main); }
        .bottom-nav-btn:active { transform: scale(0.9); }
        .nav-indicator {
            position: absolute;
            bottom: 6px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--pink-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
        }
        .bottom-nav-btn.active .nav-indicator { opacity: 1; }
        .bottom-nav-center {
            position: relative;
            margin-top: -28px;
        }
        .bottom-nav-center-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-accent));
            border: 4px solid var(--bg-main);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            box-shadow: 0 4px 20px rgba(255, 0, 127, 0.4), 0 0 0 4px rgba(255, 0, 127, 0.1);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .bottom-nav-center-btn::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, var(--pink-primary), var(--purple-accent), var(--pink-light));
            border-radius: 50%;
            z-index: -1;
            animation: glowPulse 2s ease-in-out infinite;
            opacity: 0.6;
        }
        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.3; }
        }
        .bottom-nav-center-btn:hover {
            transform: scale(1.1) translateY(-4px);
            box-shadow: 0 8px 30px rgba(255, 0, 127, 0.5);
        }
        .bottom-nav-center-btn:active { transform: scale(0.95); }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 768px) {
            body { padding-bottom: 0; }
            .feed-container { padding: 24px 24px 40px; }
            .bottom-nav-container { display: none; }
            .modal-overlay {
                align-items: center;
                padding: 20px;
            }
            .modal-card { border-radius: var(--radius); }
        }
        @media (max-width: 767px) {
            .feed-header h1 { font-size: 1.2rem; }
            .post-images.triple,
            .post-images.quad { grid-template-rows: 160px 160px; }
            .bottom-nav-container { bottom: 16px; }
            .header-actions { gap: 6px; }
            .icon-btn { width: 36px; height: 36px; font-size: 0.9rem; }
            .header-avatar { width: 34px; height: 34px; }
        }
    </style>
</head>
<body>

    <!-- Loading -->
    <div id="loading-screen" class="loading-screen">
        <div class="spinner"></div>
        <p style="color: var(--text-muted); font-size: 0.9rem; font-weight: 500;">Loading your feed...</p>
    </div>

    <!-- Header -->
    <header class="feed-header">
        <div style="display: flex; align-items: center; gap: 12px;">
            <button class="icon-btn" onclick="window.location.href='index.html'" title="Back to Chat">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>MR Feed</h1>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="saved-posts-btn" onclick="showSavedPosts()" title="Saved Posts">
                <i class="fas fa-bookmark" style="color: var(--warning);"></i>
            </button>
            <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
                <i class="fas fa-moon" id="theme-icon"></i>
            </button>
            <button class="icon-btn" id="refresh-btn" title="Refresh">
                <i class="fas fa-rotate"></i>
            </button>
            <img id="header-avatar" class="header-avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=me" alt="Me" onclick="openProfile()" onerror="this.src='https://api.dicebear.com/7.x/adventurer/svg?seed=fallback'">
        </div>
    </header>

    <!-- Stories -->
    <div class="stories-container">
        <div class="stories-scroll" id="stories-scroll">
            <!-- My Story + Others -->
        </div>
    </div>

    <!-- Create Post Bar -->
    <div class="create-post-bar">
        <img id="create-bar-avatar" class="header-avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=me" alt="Me" style="width: 40px; height: 40px;" onerror="this.src='https://api.dicebear.com/7.x/adventurer/svg?seed=fallback'">
        <div class="create-post-input" id="open-create-post">
            What's on your mind?
        </div>
    </div>

    <!-- Feed -->
    <div class="feed-container" id="feed-container">
        <div class="skeleton post-skeleton"></div>
        <div class="skeleton post-skeleton"></div>
    </div>

    <!-- Floating Bottom Nav -->
    <div class="bottom-nav-container">
        <div class="bottom-nav">
            <button class="bottom-nav-btn active" onclick="window.scrollTo({top:0,behavior:'smooth'})">
                <i class="fas fa-house"></i>
                <span>Feed</span>
                <div class="nav-indicator"></div>
            </button>
            <button class="bottom-nav-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-comment-dots"></i>
                <span>Chats</span>
                <div class="nav-indicator"></div>
            </button>
            <div class="bottom-nav-center">
                <button class="bottom-nav-center-btn" onclick="openCreatePostModal()">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <button class="bottom-nav-btn" onclick="window.location.href='games.html'">
                <i class="fas fa-gamepad"></i>
                <span>Games</span>
                <div class="nav-indicator"></div>
            </button>
            <button class="bottom-nav-btn" onclick="openProfile()">
                <i class="fas fa-user"></i>
                <span>Me</span>
                <div class="nav-indicator"></div>
            </button>
        </div>
    </div>

    <!-- Create Post Modal -->
    <div id="create-post-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Create Post</h3>
                <button class="modal-close" onclick="closeCreatePostModal()"><i class="fas fa-times"></i></button>
